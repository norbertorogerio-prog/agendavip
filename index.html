<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Agenda Inteligente</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#1b1b2a;
  --purple:#7b2cff;
  --text:#fff;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.layout{
  display:grid;
  grid-template-columns:1fr 420px;
  height:100vh;
}

.main{padding:10px;}

.kpis{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.kpi{
  flex:1;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,110px);
  gap:8px;
  justify-content:center;
}

.cell{
  background:var(--card);
  padding:6px;
  border-radius:10px;
}

.today{border:2px solid var(--purple);}

.event{
  font-size:10px;
  margin-top:3px;
  padding:3px;
  border-radius:5px;
}

.panel{
  background:#12121a;
  padding:15px;
  overflow:auto;
}

.item{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.dateBox{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  font-weight:bold;
  color:#fff;
}

.badge{
  font-size:10px;
  padding:2px 6px;
  border-radius:6px;
  margin-top:4px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="layout">

<div class="main">
<div class="kpis" id="kpis"></div>
<div id="grid" class="grid"></div>
</div>

<div class="panel">
<h3>📌 Agenda Inteligente</h3>
<div id="list"></div>
</div>

</div>

<script>
const DB="agendaWorkplace";
let events=JSON.parse(localStorage.getItem(DB)||"[]");

const colors={
reuniao:"#3b82f6",
evento:"#22c55e",
chg:"#ef4444",
outro:"#a855f7"
};

function todayStr(){
const d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getStatus(ev){
const today=todayStr();

if(ev.end < today) return "ATRASADO";
if(ev.start === today) return "HOJE";
if(ev.start > today) return "FUTURO";
if(ev.start < today && ev.end >= today) return "EM ANDAMENTO";

return "";
}

function getStatusColor(status){
return {
"ATRASADO":"#ef4444",
"HOJE":"#f59e0b",
"EM ANDAMENTO":"#22c55e",
"FUTURO":"#888"
}[status];
}

function render(){

const grid=document.getElementById("grid");
grid.innerHTML="";

const now=new Date();
const today=todayStr();

for(let i=1;i<=31;i++){
let d=new Date(now.getFullYear(),now.getMonth(),i);
if(d.getMonth()!=now.getMonth()) continue;

const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

const cell=document.createElement("div");
cell.className="cell";

if(ds===today) cell.classList.add("today");

cell.innerHTML=`<div>${i}</div>`;

events.forEach(ev=>{
if(ds>=ev.start && ds<=ev.end){
const el=document.createElement("div");
el.className="event";
el.style.background=colors[ev.tipo];
el.innerText=ev.title;
cell.appendChild(el);
}
});

grid.appendChild(cell);
}

renderList();
renderKPIs();
}

function renderList(){
const list=document.getElementById("list");
list.innerHTML="";

let conflicts={};

events.forEach(e=>{
for(let d=e.start; d<=e.end; ){
conflicts[d]=(conflicts[d]||0)+1;
let parts=d.split("-");
let dt=new Date(parts[0],parts[1]-1,parts[2]);
dt.setDate(dt.getDate()+1);
d=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}
});

events.forEach(ev=>{
const item=document.createElement("div");
item.className="item";

const day=ev.start.split("-")[2];
const status=getStatus(ev);

item.style.background= status==="ATRASADO" ? "#3a1111" : "#1b1b2a";

item.innerHTML=`
<div class="dateBox" style="background:${colors[ev.tipo]}">${day}</div>
<div>
<b>${ev.title}</b><br>
${ev.start} → ${ev.end}<br>

<span class="badge" style="background:${getStatusColor(status)}">${status}</span>

${conflicts[ev.start]>1 ? "<br>⚠️ Conflito de agenda" : ""}

</div>
`;

list.appendChild(item);
});
}

function renderKPIs(){

const today=todayStr();

const total=events.length;
const chg=events.filter(e=>e.tipo==="chg").length;
const hoje=events.filter(e=>e.start===today).length;
const atrasados=events.filter(e=>e.end < today).length;

document.getElementById("kpis").innerHTML=`
<div class="kpi">${total}<br>Total</div>
<div class="kpi">${chg}<br>CHG</div>
<div class="kpi">${hoje}<br>Hoje</div>
<div class="kpi">${atrasados}<br>Atrasados</div>
`;
}

render();
</script>

</body>
</html>
