<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Agenda Workplace</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#1b1b2a;
  --purple:#7b2cff;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.layout{
  display:grid;
  grid-template-columns:1fr 340px;
  height:100vh;
}

/* CALENDÁRIO */
.calendar{
  padding:15px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.cell{
  background:var(--card);
  min-height:110px;
  padding:6px;
  border-radius:10px;
  cursor:pointer;
}
.day{
  font-size:12px;
  color:var(--muted);
}
.event{
  font-size:11px;
  padding:4px;
  border-radius:6px;
  margin-top:4px;
}

/* PAINEL */
.panel{
  background:#12121a;
  padding:15px;
  overflow-y:auto;
}

/* KPI LINHA */
.kpis{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.kpi{
  flex:1;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.kpi strong{
  font-size:18px;
  color:var(--purple);
}

/* LISTA */
.item{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000a;
  display:none;
  align-items:center;
  justify-content:center;
}
.box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:320px;
}
input,select,textarea{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div class="layout">

<div class="calendar">
  <h2 style="color:#7b2cff;">📊 Agenda Workplace</h2>
  <div id="grid" class="grid"></div>
</div>

<div class="panel">

  <div class="kpis" id="kpis"></div>

  <h3>📌 Compromissos do Time</h3>
  <div id="list"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="box">

<form onsubmit="save(event)">
<input id="title" placeholder="Título" required>

<select id="tipo">
<option value="reuniao">Reunião</option>
<option value="evento">Evento</option>
<option value="chg">Mudança (CHG)</option>
<option value="outro">Outros</option>
</select>

<input type="date" id="start" required>
<input type="date" id="end">

<input type="time" id="time">

<select id="duration">
<option>Dia inteiro</option>
<option selected>30 min</option>
<option>1 hora</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

<button style="background:#7b2cff;color:#fff;border:none;padding:10px;width:100%;border-radius:8px;">Salvar</button>
<button type="button" onclick="deleteEvent()" style="background:#ef4444;color:#fff;border:none;padding:10px;width:100%;border-radius:8px;margin-top:5px;">Excluir</button>
<button type="button" onclick="closeModal()" style="margin-top:5px;width:100%;">Fechar</button>

</form>

</div>
</div>

<script>
const DB="agendaWorkplace";
let events=JSON.parse(localStorage.getItem(DB)||"[]");
let editId=null;
let selectedDate=null;

const colors={
reuniao:"#3b82f6",
evento:"#22c55e",
chg:"#ef4444",
outro:"#a855f7"
};

function saveDB(){localStorage.setItem(DB,JSON.stringify(events));}

function openModal(date=null){
  modal.style.display="flex";
  if(date){
    start.value=date;
    end.value=date;
  }
}

function closeModal(){
  modal.style.display="none";
  editId=null;
}

function save(e){
e.preventDefault();

const ev={
id:editId||Date.now(),
title:title.value,
tipo:tipo.value,
start:start.value,
end:end.value||start.value,
time:duration.value==="Dia inteiro"?"":time.value,
duration:duration.value,
obs:obs.value
};

if(editId){
events=events.map(x=>x.id===editId?ev:x);
}else{
events.push(ev);
}

saveDB();
closeModal();
render();
}

function deleteEvent(){
if(!editId)return;
events=events.filter(e=>e.id!==editId);
saveDB();
closeModal();
render();
}

function occurs(ev,day){
return day>=ev.start && day<=ev.end;
}

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

const now=new Date();
const y=now.getFullYear();
const m=now.getMonth();

for(let i=1;i<=31;i++){
const d=new Date(y,m,i);
if(d.getMonth()!=m) continue;

const ds=d.toISOString().slice(0,10);

const cell=document.createElement("div");
cell.className="cell";

cell.onclick=()=>openModal(ds);

const day=document.createElement("div");
day.className="day";
day.textContent=i;

cell.appendChild(day);

events.forEach(ev=>{
if(occurs(ev,ds)){
const el=document.createElement("div");
el.className="event";
el.style.background=colors[ev.tipo];

el.onclick=(e)=>{
e.stopPropagation();
edit(ev.id);
};

el.innerText=ev.duration==="Dia inteiro"
? "📅 "+ev.title
: ev.time+" "+ev.title;

cell.appendChild(el);
}
});

grid.appendChild(cell);
}

renderList();
renderKPIs();
}

function renderList(){
const list=document.getElementById("list");
list.innerHTML="";

const sorted=[...events].sort((a,b)=>a.start.localeCompare(b.start));

sorted.forEach(ev=>{
const item=document.createElement("div");
item.className="item";
item.style.borderLeft="5px solid "+colors[ev.tipo];

item.innerHTML=`
<b>${ev.title}</b><br>
${ev.start} → ${ev.end}<br>
${ev.time||"Dia inteiro"}<br>
<small>${ev.tipo}</small><br>
${ev.obs||""}
`;

list.appendChild(item);
});
}

function renderKPIs(){
const el=document.getElementById("kpis");

const total=events.length;
const reuniao=events.filter(e=>e.tipo==="reuniao").length;
const chg=events.filter(e=>e.tipo==="chg").length;
const evento=events.filter(e=>e.tipo==="evento").length;

el.innerHTML=`
<div class="kpi"><strong>${total}</strong><br>Total</div>
<div class="kpi"><strong>${reuniao}</strong><br>Reuniões</div>
<div class="kpi"><strong>${chg}</strong><br>CHG</div>
<div class="kpi"><strong>${evento}</strong><br>Eventos</div>
`;
}

function edit(id){
const ev=events.find(e=>e.id===id);
editId=id;

title.value=ev.title;
tipo.value=ev.tipo;
start.value=ev.start;
end.value=ev.end;
time.value=ev.time;
duration.value=ev.duration;
obs.value=ev.obs||"";

openModal();
}

render();
</script>

</body>
</html>
