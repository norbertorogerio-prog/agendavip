<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Time</title>

<style>
:root {
  --bg: #0b0b10;
  --card: #1b1b2a;
  --purple: #7b2cff;
  --text: #fff;
  --muted: #aaa;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
}

/* 🔥 ALTERAÇÃO ÚNICA (proporção 18 → 14) */
html {
  font-size: 78%;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ==================== VISÃO DESKTOP (PADRÃO) ==================== */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: 100vh;
  gap: 1px;
  background: var(--card);
}

.main {
  display: flex;
  flex-direction: column;
  padding: 20px;
  background: var(--bg);
  overflow-y: auto;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 0 20px;
}

.calendar-header button {
  background: var(--card);
  border: none;
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}

.calendar-header button:hover {
  background: var(--purple);
  transform: scale(1.05);
}

.month-title {
  font-size: 24px;
  font-weight: bold;
  color: var(--purple);
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 10px;
  padding: 0 10px;
}

.weekday {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: var(--purple);
  background: var(--card);
  border-radius: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 0 10px;
}

.cell {
  background: var(--card);
  min-height: 100px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.cell:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(123, 44, 255, 0.2);
}

.cell.other-month {
  opacity: 0.4;
}

.today {
  border: 2px solid var(--purple);
  background: rgba(123, 44, 255, 0.1);
}

.day-number {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
  color: var(--muted);
}

.today .day-number {
  color: var(--purple);
}

.events-container {
  max-height: 70px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.event {
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.2s;
}

.event:hover {
  filter: brightness(1.1);
  transform: scale(1.02);
}

.panel {
  background: #12121a;
  padding: 20px;
  overflow-y: auto;
  border-left: 1px solid var(--card);
}

.panel h3 {
  margin-top: 0;
  color: var(--purple);
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 16px;
}

.item {
  display: flex;
  gap: 12px;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
  transition: all 0.2s;
  cursor: pointer;
}

.item:hover {
  transform: translateX(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.dateBox {
  min-width: 50px;
  height: 50px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 20px;
  color: #fff;
}

/* Botão flutuante + */
.floating-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--purple);
  color: white;
  border: none;
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(123, 44, 255, 0.4);
  transition: all 0.2s;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.floating-btn:hover {
  transform: scale(1.1);
  background: #8b3cff;
  box-shadow: 0 6px 16px rgba(123, 44, 255, 0.5);
}

.floating-btn:active {
  transform: scale(0.95);
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.box {
  background: var(--card);
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
  from {
    transform: translateY(-50px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.box h2 {
  margin: 0 0 20px 0;
  color: var(--purple);
}

input, select, textarea {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--card);
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--purple);
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}

button:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--purple);
  color: #fff;
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-secondary {
  background: var(--card);
  color: var(--text);
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 20px;
  border-radius: 8px;
  color: #fff;
  animation: slideIn 0.3s ease;
  z-index: 2000;
}

.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--purple); }

@keyframes slideIn {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--card);
}

::-webkit-scrollbar-thumb {
  background: var(--purple);
  border-radius: 4px;
}

/* ==================== VISÃO MOBILE ==================== */
@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }
  
  .panel {
    border-left: none;
    border-top: 1px solid var(--card);
    display: block;
  }
  
  .panel h3 {
    font-size: 18px;
    font-weight: bold;
  }
  
  .weekdays, .grid, .calendar-header {
    display: none;
  }
  
  .main {
    padding: 15px;
    min-height: auto;
  }
  
  .floating-btn {
    width: 56px;
    height: 56px;
    font-size: 28px;
    bottom: 20px;
    right: 20px;
  }
}
</style>
</head>
