<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Smart Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN SYSTEM — AGENDA WORKPLACE
   ============================================= */
:root {
  --bg:           #080810;
  --bg2:          #0f0f1a;
  --surface:      #14141f;
  --surface2:     #1a1a2e;
  --surface3:     #1e1e30;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(123,44,255,0.4);

  --purple:       #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow:  rgba(124,58,237,0.35);
  --purple-soft:  rgba(124,58,237,0.12);
  --gradient:     linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);

  --blue:         #3b82f6;
  --blue-soft:    rgba(59,130,246,0.15);
  --green:        #10b981;
  --green-soft:   rgba(16,185,129,0.15);
  --red:          #ef4444;
  --red-soft:     rgba(239,68,68,0.15);
  --pink:         #ec4899;
  --pink-soft:    rgba(236,72,153,0.15);

  --text:         #f0f0ff;
  --text2:        #a0a0c0;
  --text3:        #606080;

  --radius-sm:    8px;
  --radius:       12px;
  --radius-lg:    16px;
  --radius-xl:    20px;
  --radius-full:  9999px;

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.4);
  --shadow:       0 4px 20px rgba(0,0,0,0.5);
  --shadow-glow:  0 0 30px rgba(124,58,237,0.25);
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.6);

  --transition:   all 0.2s cubic-bezier(0.4,0,0.2,1);
  --sidebar-w:    420px;
  --header-h:     64px;
}

/* =============================================
   MODO CLARO
   ============================================= */
body.light-mode {
  --bg:           #f5f5f7;
  --bg2:          #e8e8ec;
  --surface:      #ffffff;
  --surface2:     #f0f0f4;
  --surface3:     #e8e8ec;
  --border:       rgba(0,0,0,0.1);
  --border-hover: rgba(123,44,255,0.3);
  --text:         #1a1a2e;
  --text2:        #4a4a6a;
  --text3:        #6a6a8a;
  --shadow-sm:    0 2px 8px rgba(0,0,0,0.1);
  --shadow:       0 4px 20px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  transition: var(--transition);
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 99px; }

.app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr var(--sidebar-w);
  height: 100vh;
  background: var(--bg);
}

/* HEADER */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 50;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
  opacity: 0.6;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 16px var(--purple-glow);
}

.brand-name {
  font-size: 15px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-sub {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  margin-top: -2px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: var(--transition);
}
.nav-btn:hover {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
}

.month-display {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  min-width: 180px;
  text-align: center;
}

.month-display span {
  color: var(--purple-light);
}

.btn-today {
  background: var(--purple-soft);
  border: 1px solid var(--purple);
  color: var(--purple-light);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-today:hover {
  background: var(--purple);
  color: #fff;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Botões de ação */
.action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.action-btn:hover {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
}

.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.add-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(124,58,237,0.5);
}

/* CALENDÁRIO REDUZIDO */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  padding: 12px 16px 12px;
  gap: 8px;
}

.weekdays-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.weekday-label {
  text-align: center;
  padding: 4px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
}

.weekday-label.weekend {
  color: var(--purple-light);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  flex: 1;
  min-height: 0;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  min-height: 65px;
}

.day-cell:hover {
  border-color: var(--purple);
  background: var(--surface2);
}

.day-cell.other-month {
  opacity: 0.3;
}

.day-cell.today {
  border-color: var(--purple);
  background: rgba(124,58,237,0.1);
}

.day-num {
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 2px;
}

.day-cell.today .day-num {
  color: var(--purple-light);
  font-weight: 800;
}

.cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}

.ev-pill {
  font-size: 7px;
  font-weight: 500;
  padding: 1px 3px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}

.ev-more {
  font-size: 7px;
  color: var(--text3);
  cursor: pointer;
}

/* SIDEBAR - APENAS COMPROMISSOS COM SCROLL */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}

/* HEADER DO SIDEBAR */
.sidebar-header {
  padding: 16px 16px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--purple-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-title .count {
  background: var(--purple-soft);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  color: var(--purple-light);
}

/* LISTA DE COMPROMISSOS COM SCROLL */
.events-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}

/* Força o scroll a aparecer quando necessário */
.events-list::-webkit-scrollbar {
  width: 6px;
}
.events-list::-webkit-scrollbar-track {
  background: var(--surface2);
  border-radius: 3px;
}
.events-list::-webkit-scrollbar-thumb {
  background: var(--purple);
  border-radius: 3px;
}

.ev-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: visible;
  flex-shrink: 0;
}

.ev-card:hover {
  border-color: var(--purple);
  transform: translateX(3px);
}

/* BADGE ACONTECENDO AGORA */
.ev-card.happening-now {
  border-left: 4px solid var(--green);
  background: linear-gradient(135deg, var(--surface2), rgba(16,185,129,0.1));
  animation: pulse-border 1.5s infinite;
}

@keyframes pulse-border {
  0%, 100% { border-left-color: var(--green); box-shadow: 0 0 0 0 rgba(16,185,129,0.3); }
  50% { border-left-color: #2ecc71; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
}

.happening-badge {
  position: absolute;
  top: -10px;
  right: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(16,185,129,0.4);
  z-index: 10;
  animation: badge-pulse 1s infinite;
}

@keyframes badge-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.9; }
}

.ev-date-badge {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 800;
  margin-right: 12px;
  float: left;
}
.ev-date-badge .day { font-size: 18px; font-weight: 800; }
.ev-date-badge .month { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

.ev-info {
  margin-left: 60px;
}

.ev-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.ev-time {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 4px;
}

.ev-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.ev-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 9px;
  font-weight: 600;
}

.ev-obs-preview {
  font-size: 11px;
  color: var(--text);
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  line-height: 1.4;
  font-weight: 400;
  background: rgba(0,0,0,0.1);
  padding: 6px 8px;
  border-radius: var(--radius-sm);
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}

.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-text { font-size: 13px; font-weight: 500; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 92%;
  max-width: 460px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 20px 24px 0;
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  cursor: pointer;
}
.modal-body { padding: 20px 24px 24px; }
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.type-btn .t-icon { font-size: 14px; }
.type-btn.active-reuniao { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
.type-btn.active-evento { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.type-btn.active-chg { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.type-btn.active-outro { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }
.field { margin-bottom: 12px; }
.field-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
}
.field-input:focus {
  outline: none;
  border-color: var(--purple);
}
.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn-save {
  width: 100%;
  padding: 12px;
  background: var(--gradient);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-del {
  flex: 1;
  padding: 10px;
  background: var(--red-soft);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm);
  color: var(--red);
  cursor: pointer;
}
.btn-cancel {
  flex: 1;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  cursor: pointer;
}

/* TOAST */
.toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
}
.toast-item {
  padding: 10px 16px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 12px;
  margin-top: 8px;
  animation: fadeIn 0.3s;
}
.toast-success { background: #10b981; }
.toast-error { background: #ef4444; }
.toast-info { background: #7c3aed; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(100%); }
  to { opacity: 1; transform: translateX(0); }
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--surface2);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.fab-mobile {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--gradient);
  color: #fff;
  font-size: 28px;
  border: none;
  cursor: pointer;
  z-index: 200;
}

/* MODAL DE COMPARTILHAR */
.share-modal {
  max-width: 480px;
}
.share-url {
  background: var(--surface2);
  padding: 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  word-break: break-all;
  margin: 16px 0;
  border: 1px solid var(--border);
  color: var(--text2);
}
.copy-btn {
  width: 100%;
  padding: 10px;
  background: var(--purple);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}

@media (max-width: 768px) {
  .app { display: flex; flex-direction: column; height: auto; }
  .header .add-btn { display: none; }
  .header .action-btn { display: none; }
  .main { display: none; }
  .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); height: auto; min-height: 60vh; }
  .fab-mobile { display: flex; align-items: center; justify-content: center; }
  .ev-date-badge { width: 40px; height: 40px; }
  .ev-date-badge .day { font-size: 14px; }
  .ev-info { margin-left: 52px; }
  .ev-obs-preview { font-size: 10px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="app">
  <header class="header">
    <div class="header-brand">
      <div class="logo-icon">📅</div>
      <div><div class="brand-name">Agenda Workplace</div><div class="brand-sub">Smart</div></div>
    </div>
    <div class="header-center">
      <button class="nav-btn" id="prevBtn">◀</button>
      <div class="month-display"><span id="monthName">-</span> <span id="yearNum"></span></div>
      <button class="nav-btn" id="nextBtn">▶</button>
      <button class="btn-today" id="todayBtn">Hoje</button>
    </div>
    <div class="header-right">
      <button class="action-btn" id="themeToggleBtn">🌓 Tema</button>
      <button class="action-btn" id="shareBtn">🔗 Compartilhar</button>
      <button class="add-btn" id="addBtn">➕ Novo Evento</button>
    </div>
  </header>

  <main class="main">
    <div class="weekdays-row" id="weekdaysRow"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        📌 Compromissos
        <span class="count" id="totalCount">0</span>
      </div>
    </div>
    <div class="events-list" id="eventsList"></div>
  </aside>
</div>

<button class="fab-mobile" id="fabMobileBtn">+</button>

<!-- MODAL PRINCIPAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header"><div class="modal-title" id="modalTitle">Novo Compromisso</div><button class="modal-close" id="modalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">Tipo</label>
        <div class="type-grid">
          <button class="type-btn active-reuniao" data-type="reuniao" id="tb-reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento" id="tb-evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg" id="tb-chg"><span class="t-icon">⚙️</span>CHG</button>
          <button class="type-btn" data-type="outro" id="tb-outro"><span class="t-icon">📌</span>Outros</button>
        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>
      <div class="field"><label class="field-label">Título *</label><input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…"></div>
      <div class="field"><div class="date-row"><div><label class="field-label">Início *</label><input type="date" id="startInput" class="field-input"></div><div><label class="field-label">Fim</label><input type="date" id="endInput" class="field-input"></div></div></div>
      <div class="field"><div class="time-row"><div><label class="field-label">Hora</label><input type="time" id="timeInput" class="field-input"></div><div><label class="field-label">Duração</label><select id="durationInput" class="field-input"><option>Dia inteiro</option><option selected>30 min</option><option>1 hora</option></select></div></div></div>
      <div class="field"><label class="field-label">Observações</label><textarea id="obsInput" class="field-input" rows="2" placeholder="Detalhes importantes..."></textarea></div>
      <div class="modal-actions"><button class="btn-save" id="saveBtn">💾 Salvar</button><div class="btn-row"><button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button><button class="btn-cancel" id="cancelBtn">Fechar</button></div></div>
    </div>
  </div>
</div>

<!-- MODAL DE COMPARTILHAR -->
<div class="modal-overlay" id="shareModalOverlay">
  <div class="modal-box share-modal">
    <div class="modal-header"><div class="modal-title">🔗 Compartilhar Agenda</div><button class="modal-close" id="shareModalCloseBtn">✕</button></div>
    <div class="modal-body">
      <p style="font-size:12px; margin-bottom:12px; color:var(--text2)">Compartilhe este link com sua equipe. Todos verão os mesmos eventos em tempo real!</p>
      <div class="share-url" id="shareUrlDisplay">Carregando...</div>
      <button class="copy-btn" id="copyShareBtn">📋 Copiar Link</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.15)", icon: "🤝", label: "Reunião" },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.15)", icon: "🎯", label: "Evento" },
  chg:     { color: "#ef4444", soft: "rgba(239,68,68,0.15)", icon: "⚙️", label: "CHG" },
  outro:   { color: "#ec4899", soft: "rgba(236,72,153,0.15)", icon: "📌", label: "Outro" }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const WEEK_DAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let allEvents = [], currentDate = new Date(), editId = null;

const $ = id => document.getElementById(id);
function toLocalStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function occursOn(ev, dateStr) { return dateStr >= ev.start && dateStr <= (ev.end || ev.start); }

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  $("toastStack").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
  } catch { toast("Erro ao carregar", "error"); }
  finally { $("loadingOverlay")?.classList.add("hidden"); }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"PATCH", headers, body: JSON.stringify(ev) });
    else r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, { method:"POST", headers, body: JSON.stringify(ev) });
    if (!r.ok) throw new Error();
    toast(editId ? "Atualizado!" : "Criado!", "success");
    await loadEvents();
    closeModal();
  } catch { toast("Erro ao salvar", "error"); }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Excluir?")) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    toast("Removido", "info");
    await loadEvents();
    closeModal();
  } catch { toast("Erro", "error"); }
}

function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diff = Math.abs(now - evTime);
  return diff < 30 * 60 * 1000;
}

function renderCalendar() {
  const grid = $("calendarGrid"), wr = $("weekdaysRow");
  if (!grid) return;
  const year = currentDate.getFullYear(), month = currentDate.getMonth(), today = toLocalStr(new Date());
  $("monthName").textContent = MONTH_NAMES[month];
  $("yearNum").textContent = year;
  if (wr) wr.innerHTML = WEEK_DAYS.map((d,i) => `<div class="weekday-label${i===0||i===6?" weekend":""}">${d}</div>`).join("");
  grid.innerHTML = "";
  const firstDay = new Date(year, month, 1), startDate = new Date(year, month, 1 - firstDay.getDay());
  for (let i=0; i<42; i++) {
    const date = new Date(startDate); date.setDate(startDate.getDate() + i);
    const dateStr = toLocalStr(date), isCur = date.getMonth() === month, isToday = dateStr === today;
    const dayEvs = allEvents.filter(ev => occursOn(ev, dateStr));
    const cell = document.createElement("div");
    cell.className = `day-cell${!isCur ? " other-month" : ""}${isToday ? " today" : ""}`;
    cell.innerHTML = `<div class="day-num">${date.getDate()}</div><div class="cell-events"></div>`;
    const evContainer = cell.querySelector(".cell-events");
    dayEvs.slice(0,2).forEach(ev => {
      const cfg = CONFIG[ev.tipo] || CONFIG.outro;
      const pill = document.createElement("div");
      pill.className = "ev-pill";
      pill.style.cssText = `background:${cfg.soft};color:${cfg.color}`;
      pill.textContent = ev.duration==="Dia inteiro" ? ev.title.substring(0,12) : `${ev.time||"00:00"} ${ev.title.substring(0,10)}`;
      pill.addEventListener("click", e => { e.stopPropagation(); openEdit(ev.id); });
      evContainer.appendChild(pill);
    });
    if (dayEvs.length > 2) {
      const more = document.createElement("div");
      more.className = "ev-more";
      more.textContent = `+${dayEvs.length-2}`;
      more.addEventListener("click", e => { e.stopPropagation(); toast(`${dayEvs.length} eventos`, "info"); });
      evContainer.appendChild(more);
    }
    cell.addEventListener("click", () => openModal(dateStr));
    grid.appendChild(cell);
  }
}

function renderList() {
  const list = $("eventsList");
  if (!list) return;
  let filtered = [...allEvents].sort((a,b) => a.start.localeCompare(b.start));
  if (!filtered.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum compromisso</div></div>`; $("totalCount").textContent = "0"; return; }
  $("totalCount").textContent = filtered.length;
  list.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro, day = ev.start.split("-")[2], mon = MONTH_SHORT[parseInt(ev.start.split("-")[1])-1];
    const isNow = isHappeningNow(ev);
    const dateRange = ev.start === (ev.end||ev.start) ? `${day}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]}` : `${ev.start.split("-")[2]}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]} → ${(ev.end||ev.start).split("-")[2]}/${MONTH_SHORT[parseInt((ev.end||ev.start).split("-")[1])-1]}`;
    const card = document.createElement("div");
    card.className = `ev-card${isNow ? " happening-now" : ""}`;
    card.innerHTML = `${isNow ? '<div class="happening-badge">🔴 ACONTECENDO AGORA</div>' : ''}<div class="ev-date-badge" style="background:${cfg.soft};color:${cfg.color}"><div class="day">${day}</div><div class="month">${mon}</div></div><div class="ev-info"><div class="ev-title">${escapeHtml(ev.title)}</div><div class="ev-time">${dateRange} ${ev.time&&ev.duration!=="Dia inteiro"?" • "+ev.time:""}</div><div class="ev-meta"><span class="ev-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>${ev.duration ? `<span class="ev-tag" style="background:rgba(255,255,255,0.05)">⏱ ${ev.duration}</span>` : ""}</div>${ev.obs ? `<div class="ev-obs-preview">📝 ${escapeHtml(ev.obs.substring(0,120))}${ev.obs.length>120?"…":""}</div>` : ""}</div>`;
    card.addEventListener("click", () => openEdit(ev.id));
    list.appendChild(card);
  });
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function render() { renderCalendar(); renderList(); }

// ================================================================
//  MODAL PRINCIPAL
// ================================================================
function openModal(date = null) {
  editId = null; $("modalTitle").textContent = "Novo Compromisso"; $("deleteBtn").style.display = "none"; $("saveBtn").textContent = "💾 Salvar";
  if ($("titleInput")) $("titleInput").value = "";
  if ($("startInput")) $("startInput").value = date || "";
  if ($("endInput")) $("endInput").value = date || "";
  if ($("timeInput")) $("timeInput").value = "";
  if ($("durationInput")) $("durationInput").value = "30 min";
  if ($("obsInput")) $("obsInput").value = "";
  selectType("reuniao");
  $("modalOverlay").classList.add("open");
}
function openEdit(id) {
  const ev = allEvents.find(e => e.id === id); if (!ev) return;
  editId = id; $("modalTitle").textContent = "Editar"; $("deleteBtn").style.display = "block"; $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title; $("startInput").value = ev.start; $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || ""; $("durationInput").value = ev.duration || "30 min"; $("obsInput").value = ev.obs || "";
  selectType(ev.tipo || "reuniao");
  $("modalOverlay").classList.add("open");
}
function closeModal() { $("modalOverlay").classList.remove("open"); editId = null; }
function selectType(type) { $("tipoInput").value = type; ["reuniao","evento","chg","outro"].forEach(t => { const btn = $(`tb-${t}`); if(btn) btn.className = `type-btn${t===type?" active-"+t:""}`; }); }

// ================================================================
//  MODO CLARO/ESCURO
// ================================================================
function initTheme() {
  const savedTheme = localStorage.getItem('agendaTheme');
  if (savedTheme === 'light') {
    document.body.classList.add('light-mode');
  }
}
function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  localStorage.setItem('agendaTheme', isLight ? 'light' : 'dark');
  toast(isLight ? 'Modo claro ativado' : 'Modo escuro ativado', 'info');
}

// ================================================================
//  COMPARTILHAR LINK
// ================================================================
function getShareUrl() {
  return window.location.href;
}
function openShareModal() {
  const url = getShareUrl();
  $("shareUrlDisplay").textContent = url;
  $("shareModalOverlay").classList.add("open");
}
function closeShareModal() {
  $("shareModalOverlay").classList.remove("open");
}
function copyShareLink() {
  const url = $("shareUrlDisplay").textContent;
  navigator.clipboard.writeText(url).then(() => {
    toast("Link copiado! Compartilhe com sua equipe 📋", "success");
    closeShareModal();
  }).catch(() => {
    toast("Erro ao copiar", "error");
  });
}

// ================================================================
//  EVENT LISTENERS
// ================================================================
$("saveBtn")?.addEventListener("click", () => {
  const title = $("titleInput")?.value.trim(), start = $("startInput")?.value;
  if (!title || !start) { toast("Título e data obrigatórios", "error"); return; }
  saveEvent({ id: editId || Date.now(), title, tipo: $("tipoInput").value, start, end: $("endInput").value || start, time: $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value, duration: $("durationInput").value, obs: $("obsInput").value.trim() });
});
$("deleteBtn")?.addEventListener("click", deleteEvent);
$("cancelBtn")?.addEventListener("click", closeModal);
$("modalCloseBtn")?.addEventListener("click", closeModal);
$("modalOverlay")?.addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });
$("prevBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()-1); render(); });
$("nextBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()+1); render(); });
$("todayBtn")?.addEventListener("click", () => { currentDate = new Date(); render(); });
$("addBtn")?.addEventListener("click", () => openModal());
$("fabMobileBtn")?.addEventListener("click", () => openModal());
$("themeToggleBtn")?.addEventListener("click", toggleTheme);
$("shareBtn")?.addEventListener("click", openShareModal);
$("shareModalCloseBtn")?.addEventListener("click", closeShareModal);
$("copyShareBtn")?.addEventListener("click", copyShareLink);
$("shareModalOverlay")?.addEventListener("click", e => { if (e.target === $("shareModalOverlay")) closeShareModal(); });

// ================================================================
//  INICIALIZAÇÃO
// ================================================================
initTheme();
loadEvents();
</script>
</body>
</html>
