<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Agenda Workplace - Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:       #8b5cf6;
  --primary-dark:  #7c3aed;
  --primary-light: #a78bfa;
  --primary-soft:  rgba(139,92,246,0.12);
  
  --reuniao:       #3b82f6;
  --reuniao-soft:  rgba(59,130,246,0.1);
  --evento:        #10b981;
  --evento-soft:   rgba(16,185,129,0.1);
  --chg:           #f43f5e;
  --chg-soft:      rgba(244,63,94,0.1);
  --outro:         #f59e0b;
  --outro-soft:    rgba(245,158,11,0.1);
  
  --bg:            #0a0a0f;
  --surface:       #12121a;
  --card-bg:       #1a1a2a;
  --border:        rgba(255,255,255,0.06);
  
  --text:          #f0f0ff;
  --text2:         #a0a0c0;
  --text3:         #6a6a8a;
  
  --radius:        12px;
  --radius-sm:     8px;
  --radius-full:   9999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

body.light-mode {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --card-bg: #f8f8fc;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --text2: #4a4a6a;
  --text3: #6a6a8a;
}

/* TOPO */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 56px;
}

.top-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.title {
  font-size: 14px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.mini-calendar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card-bg);
  padding: 5px 12px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
}

.mini-calendar .month-year {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-light);
}

.mini-calendar .nav-mini {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
}

.add-button {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.top-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.theme-btn, .share-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 16px;
}

/* GRADE DE COMPROMISSOS */
.compromissos-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.compromissos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.event-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.event-card:hover {
  transform: translateY(-2px);
  border-color: var(--primary);
}

.badge-now {
  position: absolute;
  top: -10px;
  right: 10px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 20px;
  z-index: 5;
  animation: pulse-now 1.5s infinite;
}

@keyframes pulse-now {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.badge-reminder {
  position: absolute;
  top: -8px;
  right: 10px;
  background: linear-gradient(135deg, #f97316, #ef4444);
  color: white;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  z-index: 5;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
  padding-bottom: 5px;
}

.card-day {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary-light);
}

.card-date-range {
  font-size: 9px;
  color: var(--text3);
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.meta-tag {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: var(--radius-full);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

.location-tag {
  background: var(--primary-soft);
  color: var(--primary-light);
}

.card-obs {
  font-size: 9px;
  color: var(--text2);
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px;
  color: var(--text3);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 16px 20px 0;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text3);
  cursor: pointer;
}
.modal-body { padding: 16px 20px 20px; }

.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.type-btn .t-icon { font-size: 14px; }
.type-btn.active[data-type="reuniao"] { background: var(--reuniao-soft); border-color: var(--reuniao); color: var(--reuniao); }
.type-btn.active[data-type="evento"] { background: var(--evento-soft); border-color: var(--evento); color: var(--evento); }
.type-btn.active[data-type="chg"] { background: var(--chg-soft); border-color: var(--chg); color: var(--chg); }
.type-btn.active[data-type="outro"] { background: var(--outro-soft); border-color: var(--outro); color: var(--outro); }

.locations-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.location-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.location-checkbox.selected { border-color: var(--primary); background: var(--primary-soft); }
.location-checkbox input { width: 14px; height: 14px; cursor: pointer; }
.location-checkbox label { flex: 1; cursor: pointer; font-size: 11px; }

.field { margin-bottom: 12px; }
.field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.duration-select {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.modal-actions { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
.btn-save {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-del, .btn-cancel {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.btn-del { background: var(--chg-soft); border: 1px solid var(--chg); color: var(--chg); }
.btn-cancel { background: var(--card-bg); border: 1px solid var(--border); color: var(--text2); }

.toast-stack {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}
.toast-item {
  padding: 8px 14px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 11px;
  margin-top: 6px;
  animation: fadeIn 0.3s;
}
.toast-success { background: var(--evento); }
.toast-error { background: var(--chg); }
.toast-info { background: var(--primary); }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--card-bg);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(100%); }
  to { opacity: 1; transform: translateX(0); }
}

/* =============================================
   MOBILE - AJUSTES PARA NÃO QUEBRAR
   ============================================= */
@media (max-width: 768px) {
  body {
    overflow: auto;
    height: auto;
  }
  
  .top-bar {
    padding: 8px 12px;
    height: auto;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .top-left {
    flex: 1;
  }
  
  .logo {
    width: 28px;
    height: 28px;
    font-size: 14px;
  }
  
  .title {
    font-size: 12px;
  }
  
  .mini-calendar {
    order: 3;
    width: 100%;
    justify-content: center;
    margin-top: 4px;
  }
  
  .mini-calendar .month-year {
    font-size: 11px;
  }
  
  .top-right {
    gap: 6px;
  }
  
  .theme-btn, .share-btn {
    width: 32px;
    height: 32px;
    font-size: 14px;
  }
  
  .add-button {
    width: 32px;
    height: 32px;
    font-size: 18px;
  }
  
  .compromissos-container {
    padding: 12px;
    overflow-y: visible;
  }
  
  .compromissos-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  
  .event-card {
    padding: 12px;
    margin: 0;
  }
  
  .card-day {
    font-size: 18px;
  }
  
  .card-title {
    font-size: 13px;
    white-space: normal;
    line-height: 1.4;
  }
  
  .card-meta {
    gap: 6px;
  }
  
  .meta-tag {
    font-size: 9px;
    padding: 3px 8px;
  }
  
  .location-tag {
    font-size: 9px;
  }
  
  .card-obs {
    font-size: 10px;
    white-space: normal;
    line-height: 1.4;
  }
  
  .badge-now {
    font-size: 9px;
    padding: 3px 10px;
    top: -8px;
    right: 8px;
  }
  
  .badge-reminder {
    font-size: 7px;
    padding: 2px 6px;
  }
  
  .modal-box {
    width: 95%;
    margin: 0 auto;
  }
  
  .type-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .locations-grid {
    grid-template-columns: 1fr;
  }
  
  .toast-stack {
    bottom: 16px;
    right: 16px;
    left: 16px;
  }
  
  .toast-item {
    max-width: 100%;
  }
}

@media (max-width: 480px) {
  .top-bar {
    padding: 8px 10px;
  }
  
  .top-left {
    gap: 6px;
  }
  
  .title {
    font-size: 11px;
  }
  
  .compromissos-container {
    padding: 10px;
  }
  
  .event-card {
    padding: 10px;
  }
  
  .card-day {
    font-size: 16px;
  }
  
  .card-title {
    font-size: 12px;
  }
  
  .card-date-range {
    font-size: 8px;
  }
  
  .meta-tag {
    font-size: 8px;
    padding: 2px 6px;
  }
  
  .card-obs {
    font-size: 9px;
  }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="top-bar">
  <div class="top-left">
    <div class="logo">✨</div>
    <div class="title">Agenda Workplace</div>
  </div>
  
  <div class="mini-calendar" id="miniCalendar">
    <button class="nav-mini" id="prevMonthMini">◀</button>
    <span class="month-year" id="miniMonthYear">Março 2026</span>
    <button class="nav-mini" id="nextMonthMini">▶</button>
  </div>
  
  <div class="top-right">
    <button class="theme-btn" id="themeToggleBtn">🌓</button>
    <button class="share-btn" id="shareBtn">🔗</button>
    <button class="add-button" id="addBtn">+</button>
  </div>
</div>

<div class="compromissos-container">
  <div class="compromissos-grid" id="eventsGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header"><div class="modal-title" id="modalTitle">Novo Compromisso</div><button class="modal-close" id="modalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">📌 Tipo</label>
        <div class="type-grid" id="typeGrid">
          <button class="type-btn" data-type="reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg"><span class="t-icon">⚙️</span>CHG</button>
          <button class="type-btn" data-type="outro"><span class="t-icon">📌</span>Outros</button>
        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>
      <div class="field"><label class="field-label">📝 Título *</label><input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…"></div>
      <div class="field"><div class="date-row"><div><label style="font-size:10px">Início *</label><input type="date" id="startInput" class="field-input"></div><div><label style="font-size:10px">Fim</label><input type="date" id="endInput" class="field-input"></div></div></div>
      <div class="field"><div class="time-row"><div><label style="font-size:10px">Hora</label><input type="time" id="timeInput" class="field-input"></div><div><label style="font-size:10px">Duração</label><select id="durationInput" class="duration-select"><option>Dia inteiro</option><option>30 min</option><option>1 hora</option><option>2 horas</option><option>3 horas</option><option>4 horas</option><option>5 horas</option><option>6 horas</option><option>8 horas</option></select></div></div></div>
      <div class="field"><label class="field-label">📍 Locais</label><div class="locations-grid" id="locationsGrid"><div class="location-checkbox" data-location="workvivo"><input type="checkbox" id="loc_workvivo" value="Workvivo"><label for="loc_workvivo">💻 Workvivo</label></div><div class="location-checkbox" data-location="teams"><input type="checkbox" id="loc_teams" value="Microsoft Teams"><label for="loc_teams">🎥 Teams</label></div><div class="location-checkbox" data-location="auditorio_berrini"><input type="checkbox" id="loc_berrini" value="Auditório Berrini"><label for="loc_berrini">🏢 Auditório Berrini</label></div><div class="location-checkbox" data-location="auditorio_chucri"><input type="checkbox" id="loc_chucri" value="Auditório Chucri"><label for="loc_chucri">🏛️ Auditório Chucri</label></div></div></div>
      <div class="field"><label class="field-label">📝 Observações</label><textarea id="obsInput" class="field-input" rows="2" placeholder="Detalhes importantes..."></textarea></div>
      <div class="modal-actions"><button class="btn-save" id="saveBtn">💾 Salvar</button><div class="btn-row"><button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button><button class="btn-cancel" id="cancelBtn">Fechar</button></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shareModalOverlay">
  <div class="modal-box share-modal">
    <div class="modal-header"><div class="modal-title">🔗 Compartilhar</div><button class="modal-close" id="shareModalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="share-url" id="shareUrlDisplay">Carregando...</div>
      <button class="copy-btn" id="copyShareBtn">📋 Copiar Link</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG SUPABASE
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.1)", icon: "🤝", label: "Reunião" },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.1)", icon: "🎯", label: "Evento" },
  chg:     { color: "#f43f5e", soft: "rgba(244,63,94,0.1)", icon: "⚙️", label: "CHG" },
  outro:   { color: "#f59e0b", soft: "rgba(245,158,11,0.1)", icon: "📌", label: "Outro" }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let allEvents = [], currentDate = new Date(), editId = null;
let reminderCheckInterval = null;

const $ = id => document.getElementById(id);

function toLocalStr(d) { 
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function occursOn(ev, dateStr) { return dateStr >= ev.start && dateStr <= (ev.end || ev.start); }

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  $("toastStack").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
    startReminderCheck();
  } catch { toast("Erro ao carregar", "error"); }
  finally { $("loadingOverlay")?.classList.add("hidden"); }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { 
        method: "PATCH", headers, 
        body: JSON.stringify({
          title: ev.title, tipo: ev.tipo, start: ev.start, end: ev.end,
          time: ev.time, duration: ev.duration, obs: ev.obs, locations: ev.locations || null
        })
      });
    } else {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, { method: "POST", headers, body: JSON.stringify(ev) });
    }
    if (!r.ok) throw new Error();
    toast(editId ? "Atualizado!" : "Criado!", "success");
    await loadEvents();
    closeModal();
  } catch { toast("Erro ao salvar", "error"); }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Excluir?")) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    toast("Removido", "info");
    await loadEvents();
    closeModal();
  } catch { toast("Erro", "error"); }
}

function isWithin15Minutes(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return false;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diffMinutes = (evTime - now) / (1000 * 60);
  return diffMinutes > 0 && diffMinutes <= 15;
}

function startReminderCheck() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(() => {
    const eventsToRemind = allEvents.filter(ev => isWithin15Minutes(ev));
    eventsToRemind.forEach(ev => {
      if (!ev._reminded) {
        ev._reminded = true;
        toast(`🔔 Em até 15min: ${ev.title}`, "info");
        setTimeout(() => { ev._reminded = false; }, 60000);
      }
    });
    renderList();
  }, 30000);
}

function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diff = Math.abs(now - evTime);
  return diff < 30 * 60 * 1000;
}

function updateMiniCalendar() {
  const monthYear = document.getElementById("miniMonthYear");
  if (monthYear) {
    monthYear.textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  }
}

function formatEventDate(ev) {
  const startParts = ev.start.split('-');
  const startDate = new Date(parseInt(startParts[0]), parseInt(startParts[1]) - 1, parseInt(startParts[2]));
  const endParts = (ev.end || ev.start).split('-');
  const endDate = new Date(parseInt(endParts[0]), parseInt(endParts[1]) - 1, parseInt(endParts[2]));
  const startDay = startDate.getDate();
  const startMonth = MONTH_SHORT[startDate.getMonth()];
  const endDay = endDate.getDate();
  const endMonth = MONTH_SHORT[endDate.getMonth()];
  
  if (startDate.toDateString() === endDate.toDateString()) {
    return { day: startDay, month: startMonth, range: `${startDay} ${startMonth}` };
  } else {
    return { day: startDay, month: startMonth, range: `${startDay}/${startMonth} → ${endDay}/${endMonth}` };
  }
}

function renderList() {
  const grid = $("eventsGrid");
  if (!grid) return;
  let filtered = [...allEvents].sort((a,b) => a.start.localeCompare(b.start));
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum compromisso agendado</div></div>`;
    return;
  }
  grid.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro;
    const { day, month, range } = formatEventDate(ev);
    const isNow = isHappeningNow(ev);
    const isReminder = isWithin15Minutes(ev);
    let badgeHtml = '';
    if (isNow) badgeHtml = '<div class="badge-now">🔴 ACONTECENDO AGORA</div>';
    else if (isReminder) badgeHtml = '<div class="badge-reminder">⏰ EM ATÉ 15MIN</div>';
    let locationsHtml = '';
    if (ev.locations) {
      const locs = ev.locations.split(',').map(l => l.trim());
      locationsHtml = `<div class="card-meta">${locs.map(loc => `<span class="meta-tag location-tag">📍 ${loc}</span>`).join('')}</div>`;
    }
    const card = document.createElement("div");
    card.className = "event-card";
    card.innerHTML = `
      ${badgeHtml}
      <div class="card-header">
        <span class="card-day">${day}</span>
        <span class="card-date-range">${range}</span>
      </div>
      <div class="card-title">${escapeHtml(ev.title)}</div>
      <div class="card-meta">
        <span class="meta-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
        ${ev.time && ev.duration !== "Dia inteiro" ? `<span class="meta-tag">⏰ ${ev.time}</span>` : ''}
        ${ev.duration && ev.duration !== "Dia inteiro" ? `<span class="meta-tag">⏱ ${ev.duration}</span>` : ev.duration === "Dia inteiro" ? `<span class="meta-tag">📅 Dia inteiro</span>` : ''}
      </div>
      ${locationsHtml}
      ${ev.obs ? `<div class="card-obs">📝 ${escapeHtml(ev.obs.substring(0,80))}${ev.obs.length>80?"…":""}</div>` : ''}
    `;
    card.addEventListener("click", () => openEdit(ev.id));
    grid.appendChild(card);
  });
}

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function render() { renderList(); updateMiniCalendar(); }

let selectedType = "reuniao", selectedLocations = [];

function initTypeButtons() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $("tipoInput").value = selectedType;
    });
  });
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
}

function initLocationCheckboxes() {
  document.querySelectorAll('.location-checkbox').forEach(item => {
    const cb = item.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) { if (!selectedLocations.includes(cb.value)) selectedLocations.push(cb.value); item.classList.add('selected'); }
      else { selectedLocations = selectedLocations.filter(l => l !== cb.value); item.classList.remove('selected'); }
    });
  });
}

function resetLocations() { selectedLocations = []; document.querySelectorAll('.location-checkbox input').forEach(cb => { cb.checked = false; cb.closest('.location-checkbox').classList.remove('selected'); }); }
function setLocationsFromEvent(locations) {
  resetLocations();
  if (locations) {
    locations.split(',').map(l => l.trim()).forEach(loc => {
      const cb = document.querySelector(`.location-checkbox input[value="${loc}"]`);
      if (cb) { cb.checked = true; cb.closest('.location-checkbox').classList.add('selected'); selectedLocations.push(loc); }
    });
  }
}

function openModal(date = null) {
  editId = null; $("modalTitle").textContent = "Novo Compromisso"; $("deleteBtn").style.display = "none"; $("saveBtn").textContent = "💾 Salvar";
  $("titleInput").value = ""; $("startInput").value = date || ""; $("endInput").value = date || ""; $("timeInput").value = ""; $("durationInput").value = "30 min"; $("obsInput").value = "";
  selectedType = "reuniao";
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
  resetLocations();
  $("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const ev = allEvents.find(e => e.id === id); if (!ev) return;
  editId = id; $("modalTitle").textContent = "Editar"; $("deleteBtn").style.display = "block"; $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title; $("startInput").value = ev.start; $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || ""; $("durationInput").value = ev.duration || "30 min"; $("obsInput").value = ev.obs || "";
  const tipo = ev.tipo || "reuniao";
  selectedType = tipo;
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.type-btn[data-type="${tipo}"]`).classList.add('active');
  $("tipoInput").value = tipo;
  setLocationsFromEvent(ev.locations);
  $("modalOverlay").classList.add("open");
}
function closeModal() { $("modalOverlay").classList.remove("open"); editId = null; }

$("saveBtn")?.addEventListener("click", () => {
  const title = $("titleInput")?.value.trim(), start = $("startInput")?.value;
  if (!title || !start) { toast("Título e data obrigatórios", "error"); return; }
  saveEvent({ id: editId || Date.now(), title, tipo: $("tipoInput").value, start, end: $("endInput").value || start, time: $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value, duration: $("durationInput").value, obs: $("obsInput").value.trim(), locations: selectedLocations.length ? selectedLocations.join(", ") : null });
});
$("deleteBtn")?.addEventListener("click", deleteEvent);
$("cancelBtn")?.addEventListener("click", closeModal);
$("modalCloseBtn")?.addEventListener("click", closeModal);
$("modalOverlay")?.addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });

$("prevMonthMini")?.addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateMiniCalendar();
});
$("nextMonthMini")?.addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateMiniCalendar();
});
$("addBtn")?.addEventListener("click", () => openModal());

function initTheme() { if (localStorage.getItem('agendaTheme') === 'light') document.body.classList.add('light-mode'); }
function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('agendaTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); toast(document.body.classList.contains('light-mode') ? 'Modo claro' : 'Modo escuro', 'info'); }
function openShareModal() { $("shareUrlDisplay").textContent = window.location.href; $("shareModalOverlay").classList.add("open"); }
function closeShareModal() { $("shareModalOverlay").classList.remove("open"); }
function copyShareLink() { navigator.clipboard.writeText($("shareUrlDisplay").textContent).then(() => { toast("Link copiado! 📋", "success"); closeShareModal(); }).catch(() => toast("Erro", "error")); }

$("themeToggleBtn")?.addEventListener("click", toggleTheme);
$("shareBtn")?.addEventListener("click", openShareModal);
$("shareModalCloseBtn")?.addEventListener("click", closeShareModal);
$("copyShareBtn")?.addEventListener("click", copyShareLink);
$("shareModalOverlay")?.addEventListener("click", e => { if (e.target === $("shareModalOverlay")) closeShareModal(); });

initTypeButtons();
initLocationCheckboxes();
initTheme();
loadEvents();
</script>
</body>
</html>
