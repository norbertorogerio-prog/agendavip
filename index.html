<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN SYSTEM — PALETA HARMONIZADA
   ============================================= */
:root {
  --primary:       #8b5cf6;
  --primary-dark:  #7c3aed;
  --primary-light: #a78bfa;
  --primary-glow:  rgba(139,92,246,0.35);
  --primary-soft:  rgba(139,92,246,0.12);
  
  --reuniao:       #3b82f6;
  --reuniao-soft:  rgba(59,130,246,0.12);
  --evento:        #10b981;
  --evento-soft:   rgba(16,185,129,0.12);
  --chg:           #f43f5e;
  --chg-soft:      rgba(244,63,94,0.12);
  --outro:         #f59e0b;
  --outro-soft:    rgba(245,158,11,0.12);
  
  --bg:            #0a0a0f;
  --bg2:           #111117;
  --surface:       #16161f;
  --surface2:      #1e1e2a;
  --surface3:      #262632;
  --border:        rgba(255,255,255,0.06);
  --border-hover:  rgba(139,92,246,0.4);
  
  --text:          #f0f0ff;
  --text2:         #a0a0c0;
  --text3:         #6a6a8a;
  
  --radius-sm:     6px;
  --radius:        10px;
  --radius-lg:     14px;
  --radius-xl:     18px;
  --radius-full:   9999px;
  
  --shadow-sm:     0 2px 8px rgba(0,0,0,0.3);
  --shadow:        0 4px 16px rgba(0,0,0,0.4);
  
  --transition:    all 0.2s ease;
  --sidebar-w:     380px;
  --header-h:      64px;
}

/* MODO CLARO */
body.light-mode {
  --bg:            #f8fafc;
  --bg2:           #f1f5f9;
  --surface:       #ffffff;
  --surface2:      #f8fafc;
  --surface3:      #f1f5f9;
  --border:        rgba(0,0,0,0.08);
  --text:          #0f172a;
  --text2:         #334155;
  --text3:         #64748b;
  --shadow-sm:     0 2px 8px rgba(0,0,0,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #1a1a2a 100%);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  transition: var(--transition);
}

body.light-mode {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
}

/* =============================================
   LAYOUT RESPONSIVO
   ============================================= */
.app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr var(--sidebar-w);
  height: 100vh;
  background: transparent;
}

/* HEADER */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(22,22,31,0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}

body.light-mode .header {
  background: rgba(255,255,255,0.8);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.brand-name {
  font-size: 14px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-sub {
  font-size: 9px;
  color: var(--text3);
  margin-top: -2px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: var(--transition);
}
.nav-btn:hover {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary-light);
}

.month-display {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  min-width: 150px;
  text-align: center;
}

.month-display span {
  color: var(--primary-light);
}

.btn-today {
  background: var(--primary-soft);
  border: 1px solid var(--primary);
  color: var(--primary-light);
  padding: 5px 12px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-today:hover {
  background: var(--primary);
  color: #fff;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
}
.action-btn:hover {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary-light);
}

.add-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.add-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--primary-glow);
}

/* CALENDÁRIO */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 12px;
  gap: 8px;
  height: 100%;
}

.weekdays-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.weekday-label {
  text-align: center;
  padding: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  flex: 1;
  min-height: 0;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 4px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.day-cell:hover {
  border-color: var(--primary);
  background: var(--surface2);
}

.day-cell.other-month {
  opacity: 0.3;
}

.day-cell.today {
  border-color: var(--primary);
  background: var(--primary-soft);
}

.day-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 3px;
}

.day-cell.today .day-num {
  color: var(--primary-light);
}

.cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}

.ev-pill {
  font-size: 8px;
  font-weight: 500;
  padding: 1px 3px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}

.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-title .count {
  background: var(--primary-soft);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
}

/* LISTA EM 2 COLUNAS - COMPACTA */
.events-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  min-height: 0;
}

.events-list::-webkit-scrollbar {
  width: 5px;
}
.events-list::-webkit-scrollbar-track {
  background: var(--surface2);
  border-radius: 3px;
}
.events-list::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 3px;
}

.ev-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}

.ev-card:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
}

.reminder-badge, .happening-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  font-size: 7px;
  font-weight: 800;
  padding: 2px 6px;
  border-radius: 20px;
  white-space: nowrap;
  z-index: 10;
}

.reminder-badge {
  background: linear-gradient(135deg, #f97316, #ef4444);
  color: white;
}

.happening-badge {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
}

.ev-date-badge {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  float: left;
  margin-right: 8px;
}
.ev-date-badge .day { font-size: 14px; font-weight: 800; }
.ev-date-badge .month { font-size: 7px; font-weight: 600; text-transform: uppercase; }

.ev-info {
  margin-left: 44px;
}

.ev-title {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ev-time {
  font-size: 9px;
  color: var(--text3);
  margin-bottom: 2px;
}

.ev-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}

.ev-tag {
  font-size: 8px;
  padding: 1px 5px;
  border-radius: var(--radius-full);
  font-weight: 600;
}

.ev-location-tag {
  background: var(--primary-soft);
  color: var(--primary-light);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: var(--radius-full);
  display: inline-flex;
  align-items: center;
  gap: 2px;
}

.ev-obs-preview {
  font-size: 8px;
  color: var(--text2);
  margin-top: 4px;
  padding-top: 3px;
  border-top: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.empty-state {
  grid-column: span 2;
  text-align: center;
  padding: 30px;
  color: var(--text3);
}

/* MODAL (simplificado) */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 16px 20px 0;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  cursor: pointer;
}
.modal-body { padding: 16px 20px 20px; }

.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.type-btn .t-icon { font-size: 14px; }
.type-btn.active[data-type="reuniao"] { background: var(--reuniao-soft); border-color: var(--reuniao); color: var(--reuniao); }
.type-btn.active[data-type="evento"] { background: var(--evento-soft); border-color: var(--evento); color: var(--evento); }
.type-btn.active[data-type="chg"] { background: var(--chg-soft); border-color: var(--chg); color: var(--chg); }
.type-btn.active[data-type="outro"] { background: var(--outro-soft); border-color: var(--outro); color: var(--outro); }

.locations-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.location-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.location-checkbox.selected { border-color: var(--primary); background: var(--primary-soft); }
.location-checkbox input { width: 14px; height: 14px; cursor: pointer; }
.location-checkbox label { flex: 1; cursor: pointer; font-size: 11px; }

.field { margin-bottom: 12px; }
.field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.field-input:focus { outline: none; border-color: var(--primary); }
.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.duration-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.modal-actions { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
.btn-save {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-del, .btn-cancel {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.btn-del { background: var(--chg-soft); border: 1px solid var(--chg); color: var(--chg); }
.btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }

.toast-stack {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}
.toast-item {
  padding: 8px 14px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 11px;
  margin-top: 6px;
  animation: fadeIn 0.3s;
}
.toast-success { background: var(--evento); }
.toast-error { background: var(--chg); }
.toast-info { background: var(--primary); }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--surface2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(100%); }
  to { opacity: 1; transform: translateX(0); }
}

.fab-mobile {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  font-size: 26px;
  border: none;
  cursor: pointer;
  z-index: 200;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px var(--primary-glow);
}

.share-modal { max-width: 450px; }
.share-url {
  background: var(--surface2);
  padding: 10px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  word-break: break-all;
  margin: 12px 0;
}
.copy-btn {
  width: 100%;
  padding: 8px;
  background: var(--primary);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
  font-size: 12px;
}

/* =============================================
   RESPONSIVIDADE
   ============================================= */

/* TABLET (768px - 1024px) */
@media (min-width: 768px) and (max-width: 1024px) {
  :root {
    --sidebar-w: 320px;
  }
  
  .events-list {
    grid-template-columns: 1fr;
    gap: 8px;
  }
  
  .ev-card {
    padding: 8px;
  }
  
  .ev-date-badge {
    width: 32px;
    height: 32px;
  }
  .ev-date-badge .day { font-size: 12px; }
  .ev-info { margin-left: 40px; }
  
  .ev-title { font-size: 10px; }
  .ev-time { font-size: 8px; }
  .ev-tag, .ev-location-tag { font-size: 7px; }
  .ev-obs-preview { font-size: 7px; }
  
  .header-right .action-btn span:not(.icon) {
    display: none;
  }
  .action-btn { padding: 5px 8px; }
}

/* MOBILE (até 768px) */
@media (max-width: 768px) {
  body {
    overflow: auto;
    height: auto;
  }
  
  .app {
    display: flex;
    flex-direction: column;
    height: auto;
    min-height: 100vh;
  }
  
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 12px;
  }
  
  .header .add-btn {
    display: none;
  }
  
  .header .action-btn span:not(.icon) {
    display: none;
  }
  
  .action-btn {
    padding: 5px 8px;
  }
  
  .brand-sub {
    display: none;
  }
  
  .month-display {
    font-size: 12px;
    min-width: 100px;
  }
  
  .nav-btn {
    width: 28px;
    height: 28px;
    font-size: 12px;
  }
  
  .btn-today {
    padding: 4px 8px;
    font-size: 9px;
  }
  
  /* ESCONDE CALENDÁRIO NO MOBILE */
  .main {
    display: none;
  }
  
  /* SIDEBAR OCUPA TELA INTEIRA */
  .sidebar {
    width: 100%;
    border-left: none;
    border-top: 1px solid var(--border);
    height: auto;
    min-height: 60vh;
  }
  
  .events-list {
    grid-template-columns: 1fr;
    padding: 12px;
    padding-bottom: 80px;
  }
  
  .ev-card {
    padding: 12px;
  }
  
  .ev-date-badge {
    width: 40px;
    height: 40px;
  }
  .ev-date-badge .day { font-size: 16px; }
  .ev-info { margin-left: 48px; }
  
  .ev-title { font-size: 12px; }
  .ev-time { font-size: 10px; }
  .ev-tag, .ev-location-tag { font-size: 9px; }
  .ev-obs-preview { font-size: 9px; white-space: normal; }
  
  .fab-mobile {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .locations-grid {
    grid-template-columns: 1fr;
  }
  
  .modal-box {
    width: 95%;
    max-width: none;
  }
  
  .toast-stack {
    bottom: 80px;
    right: 16px;
    left: 16px;
  }
  .toast-item {
    max-width: 100%;
  }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="app">
  <header class="header">
    <div class="header-brand">
      <div class="logo-icon">✨</div>
      <div><div class="brand-name">Agenda Workplace</div><div class="brand-sub">Premium</div></div>
    </div>
    <div class="header-center">
      <button class="nav-btn" id="prevBtn">◀</button>
      <div class="month-display"><span id="monthName">-</span> <span id="yearNum"></span></div>
      <button class="nav-btn" id="nextBtn">▶</button>
      <button class="btn-today" id="todayBtn">Hoje</button>
    </div>
    <div class="header-right">
      <button class="action-btn" id="themeToggleBtn">🌓</button>
      <button class="action-btn" id="shareBtn">🔗</button>
      <button class="add-btn" id="addBtn">➕ Novo</button>
    </div>
  </header>

  <main class="main">
    <div class="weekdays-row" id="weekdaysRow"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        📌 Compromissos
        <span class="count" id="totalCount">0</span>
      </div>
    </div>
    <div class="events-list" id="eventsList"></div>
  </aside>
</div>

<button class="fab-mobile" id="fabMobileBtn">+</button>

<!-- MODAL PRINCIPAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header"><div class="modal-title" id="modalTitle">Novo Compromisso</div><button class="modal-close" id="modalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">📌 Tipo</label>
        <div class="type-grid" id="typeGrid">
          <button class="type-btn" data-type="reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg"><span class="t-icon">⚙️</span>CHG</button>
          <button class="type-btn" data-type="outro"><span class="t-icon">📌</span>Outros</button>
        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>
      <div class="field"><label class="field-label">📝 Título *</label><input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…"></div>
      <div class="field"><div class="date-row"><div><label style="font-size:10px">Início *</label><input type="date" id="startInput" class="field-input"></div><div><label style="font-size:10px">Fim</label><input type="date" id="endInput" class="field-input"></div></div></div>
      <div class="field"><div class="time-row"><div><label style="font-size:10px">Hora</label><input type="time" id="timeInput" class="field-input"></div><div><label style="font-size:10px">Duração</label><select id="durationInput" class="duration-select"><option>Dia inteiro</option><option>30 min</option><option>1 hora</option><option>2 horas</option><option>3 horas</option><option>4 horas</option><option>5 horas</option><option>6 horas</option><option>8 horas</option></select></div></div></div>
      <div class="field"><label class="field-label">📍 Locais</label><div class="locations-grid" id="locationsGrid"><div class="location-checkbox" data-location="workvivo"><input type="checkbox" id="loc_workvivo" value="Workvivo"><label for="loc_workvivo">💻 Workvivo</label></div><div class="location-checkbox" data-location="teams"><input type="checkbox" id="loc_teams" value="Microsoft Teams"><label for="loc_teams">🎥 Teams</label></div><div class="location-checkbox" data-location="auditorio_berrini"><input type="checkbox" id="loc_berrini" value="Auditório Berrini"><label for="loc_berrini">🏢 Auditório Berrini</label></div><div class="location-checkbox" data-location="auditorio_chucri"><input type="checkbox" id="loc_chucri" value="Auditório Chucri"><label for="loc_chucri">🏛️ Auditório Chucri</label></div></div></div>
      <div class="field"><label class="field-label">📝 Observações</label><textarea id="obsInput" class="field-input" rows="2" placeholder="Detalhes importantes..."></textarea></div>
      <div class="modal-actions"><button class="btn-save" id="saveBtn">💾 Salvar</button><div class="btn-row"><button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button><button class="btn-cancel" id="cancelBtn">Fechar</button></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shareModalOverlay">
  <div class="modal-box share-modal">
    <div class="modal-header"><div class="modal-title">🔗 Compartilhar</div><button class="modal-close" id="shareModalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="share-url" id="shareUrlDisplay">Carregando...</div>
      <button class="copy-btn" id="copyShareBtn">📋 Copiar Link</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG SUPABASE
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.12)", icon: "🤝", label: "Reunião" },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.12)", icon: "🎯", label: "Evento" },
  chg:     { color: "#f43f5e", soft: "rgba(244,63,94,0.12)", icon: "⚙️", label: "CHG" },
  outro:   { color: "#f59e0b", soft: "rgba(245,158,11,0.12)", icon: "📌", label: "Outro" }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const WEEK_DAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let allEvents = [], currentDate = new Date(), editId = null;
let reminderCheckInterval = null;

const $ = id => document.getElementById(id);
function toLocalStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function occursOn(ev, dateStr) { return dateStr >= ev.start && dateStr <= (ev.end || ev.start); }

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  $("toastStack").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
    startReminderCheck();
  } catch { toast("Erro ao carregar", "error"); }
  finally { $("loadingOverlay")?.classList.add("hidden"); }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { 
        method: "PATCH", headers, 
        body: JSON.stringify({
          title: ev.title, tipo: ev.tipo, start: ev.start, end: ev.end,
          time: ev.time, duration: ev.duration, obs: ev.obs, locations: ev.locations || null
        })
      });
    } else {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, { method: "POST", headers, body: JSON.stringify(ev) });
    }
    if (!r.ok) throw new Error();
    toast(editId ? "Atualizado!" : "Criado!", "success");
    await loadEvents();
    closeModal();
  } catch (err) {
    toast("Erro ao salvar", "error");
  }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Excluir?")) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    toast("Removido", "info");
    await loadEvents();
    closeModal();
  } catch { toast("Erro", "error"); }
}

function isWithin15Minutes(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return false;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diffMinutes = (evTime - now) / (1000 * 60);
  return diffMinutes > 0 && diffMinutes <= 15;
}

function startReminderCheck() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(() => {
    const eventsToRemind = allEvents.filter(ev => isWithin15Minutes(ev));
    eventsToRemind.forEach(ev => {
      if (!ev._reminded) {
        ev._reminded = true;
        toast(`🔔 Em até 15min: ${ev.title}`, "info");
        setTimeout(() => { ev._reminded = false; }, 60000);
      }
    });
    renderList();
  }, 30000);
}

function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diff = Math.abs(now - evTime);
  return diff < 30 * 60 * 1000;
}

function renderCalendar() {
  const grid = $("calendarGrid"), wr = $("weekdaysRow");
  if (!grid) return;
  const year = currentDate.getFullYear(), month = currentDate.getMonth(), today = toLocalStr(new Date());
  $("monthName").textContent = MONTH_NAMES[month];
  $("yearNum").textContent = year;
  if (wr) wr.innerHTML = WEEK_DAYS.map((d,i) => `<div class="weekday-label${i===0||i===6?" weekend":""}">${d}</div>`).join("");
  grid.innerHTML = "";
  const firstDay = new Date(year, month, 1), startDate = new Date(year, month, 1 - firstDay.getDay());
  for (let i=0; i<42; i++) {
    const date = new Date(startDate); date.setDate(startDate.getDate() + i);
    const dateStr = toLocalStr(date), isCur = date.getMonth() === month, isToday = dateStr === today;
    const dayEvs = allEvents.filter(ev => occursOn(ev, dateStr));
    const cell = document.createElement("div");
    cell.className = `day-cell${!isCur ? " other-month" : ""}${isToday ? " today" : ""}`;
    cell.innerHTML = `<div class="day-num">${date.getDate()}</div><div class="cell-events"></div>`;
    const evContainer = cell.querySelector(".cell-events");
    dayEvs.slice(0,2).forEach(ev => {
      const cfg = CONFIG[ev.tipo] || CONFIG.outro;
      const pill = document.createElement("div");
      pill.className = "ev-pill";
      pill.style.cssText = `background:${cfg.soft};color:${cfg.color}`;
      pill.textContent = ev.duration==="Dia inteiro" ? ev.title.substring(0,12) : `${ev.time||"00:00"} ${ev.title.substring(0,10)}`;
      pill.addEventListener("click", e => { e.stopPropagation(); openEdit(ev.id); });
      evContainer.appendChild(pill);
    });
    if (dayEvs.length > 2) {
      const more = document.createElement("div");
      more.className = "ev-more";
      more.textContent = `+${dayEvs.length-2}`;
      more.addEventListener("click", e => { e.stopPropagation(); toast(`${dayEvs.length} eventos`, "info"); });
      evContainer.appendChild(more);
    }
    cell.addEventListener("click", () => openModal(dateStr));
    grid.appendChild(cell);
  }
}

function renderList() {
  const list = $("eventsList");
  if (!list) return;
  let filtered = [...allEvents].sort((a,b) => a.start.localeCompare(b.start));
  if (!filtered.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum compromisso</div></div>`; $("totalCount").textContent = "0"; return; }
  $("totalCount").textContent = filtered.length;
  list.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro, day = ev.start.split("-")[2], mon = MONTH_SHORT[parseInt(ev.start.split("-")[1])-1];
    const isNow = isHappeningNow(ev);
    const isReminder = isWithin15Minutes(ev);
    const dateRange = ev.start === (ev.end||ev.start) ? `${day}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]}` : `${ev.start.split("-")[2]}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]} → ${(ev.end||ev.start).split("-")[2]}/${MONTH_SHORT[parseInt((ev.end||ev.start).split("-")[1])-1]}`;
    const card = document.createElement("div");
    card.className = `ev-card${isNow ? " happening-now" : ""}`;
    
    let badgeHtml = '';
    if (isNow) badgeHtml = '<div class="happening-badge">🔴 AGORA</div>';
    else if (isReminder) badgeHtml = '<div class="reminder-badge">⏰ 15MIN</div>';
    
    let locationsHtml = '';
    if (ev.locations) {
      const locs = ev.locations.split(',').map(l => l.trim());
      locationsHtml = `<div class="ev-meta">${locs.map(loc => `<span class="ev-location-tag">📍 ${loc}</span>`).join('')}</div>`;
    }
    
    card.innerHTML = `${badgeHtml}<div class="ev-date-badge" style="background:${cfg.soft};color:${cfg.color}"><div class="day">${day}</div><div class="month">${mon}</div></div><div class="ev-info"><div class="ev-title">${escapeHtml(ev.title)}</div><div class="ev-time">${dateRange} ${ev.time&&ev.duration!=="Dia inteiro"?" • "+ev.time:""}</div><div class="ev-meta"><span class="ev-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>${ev.duration ? `<span class="ev-tag" style="background:rgba(255,255,255,0.05)">⏱ ${ev.duration}</span>` : ""}</div>${locationsHtml}${ev.obs ? `<div class="ev-obs-preview">📝 ${escapeHtml(ev.obs.substring(0,70))}${ev.obs.length>70?"…":""}</div>` : ""}</div>`;
    card.addEventListener("click", () => openEdit(ev.id));
    list.appendChild(card);
  });
}

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function render() { renderCalendar(); renderList(); }

let selectedType = "reuniao", selectedLocations = [];

function initTypeButtons() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $("tipoInput").value = selectedType;
    });
  });
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
}

function initLocationCheckboxes() {
  document.querySelectorAll('.location-checkbox').forEach(item => {
    const cb = item.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) { if (!selectedLocations.includes(cb.value)) selectedLocations.push(cb.value); item.classList.add('selected'); }
      else { selectedLocations = selectedLocations.filter(l => l !== cb.value); item.classList.remove('selected'); }
    });
  });
}

function resetLocations() { selectedLocations = []; document.querySelectorAll('.location-checkbox input').forEach(cb => { cb.checked = false; cb.closest('.location-checkbox').classList.remove('selected'); }); }
function setLocationsFromEvent(locations) {
  resetLocations();
  if (locations) {
    locations.split(',').map(l => l.trim()).forEach(loc => {
      const cb = document.querySelector(`.location-checkbox input[value="${loc}"]`);
      if (cb) { cb.checked = true; cb.closest('.location-checkbox').classList.add('selected'); selectedLocations.push(loc); }
    });
  }
}

function openModal(date = null) {
  editId = null; $("modalTitle").textContent = "Novo Compromisso"; $("deleteBtn").style.display = "none"; $("saveBtn").textContent = "💾 Salvar";
  $("titleInput").value = ""; $("startInput").value = date || ""; $("endInput").value = date || ""; $("timeInput").value = ""; $("durationInput").value = "30 min"; $("obsInput").value = "";
  selectedType = "reuniao";
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
  resetLocations();
  $("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const ev = allEvents.find(e => e.id === id); if (!ev) return;
  editId = id; $("modalTitle").textContent = "Editar"; $("deleteBtn").style.display = "block"; $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title; $("startInput").value = ev.start; $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || ""; $("durationInput").value = ev.duration || "30 min"; $("obsInput").value = ev.obs || "";
  const tipo = ev.tipo || "reuniao";
  selectedType = tipo;
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.type-btn[data-type="${tipo}"]`).classList.add('active');
  $("tipoInput").value = tipo;
  setLocationsFromEvent(ev.locations);
  $("modalOverlay").classList.add("open");
}
function closeModal() { $("modalOverlay").classList.remove("open"); editId = null; }

$("saveBtn")?.addEventListener("click", () => {
  const title = $("titleInput")?.value.trim(), start = $("startInput")?.value;
  if (!title || !start) { toast("Título e data obrigatórios", "error"); return; }
  saveEvent({ id: editId || Date.now(), title, tipo: $("tipoInput").value, start, end: $("endInput").value || start, time: $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value, duration: $("durationInput").value, obs: $("obsInput").value.trim(), locations: selectedLocations.length ? selectedLocations.join(", ") : null });
});
$("deleteBtn")?.addEventListener("click", deleteEvent);
$("cancelBtn")?.addEventListener("click", closeModal);
$("modalCloseBtn")?.addEventListener("click", closeModal);
$("modalOverlay")?.addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });
$("prevBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()-1); render(); });
$("nextBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()+1); render(); });
$("todayBtn")?.addEventListener("click", () => { currentDate = new Date(); render(); });
$("addBtn")?.addEventListener("click", () => openModal());
$("fabMobileBtn")?.addEventListener("click", () => openModal());

function initTheme() { if (localStorage.getItem('agendaTheme') === 'light') document.body.classList.add('light-mode'); }
function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('agendaTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); toast(document.body.classList.contains('light-mode') ? 'Modo claro' : 'Modo escuro', 'info'); }
function openShareModal() { $("shareUrlDisplay").textContent = window.location.href; $("shareModalOverlay").classList.add("open"); }
function closeShareModal() { $("shareModalOverlay").classList.remove("open"); }
function copyShareLink() { navigator.clipboard.writeText($("shareUrlDisplay").textContent).then(() => { toast("Link copiado! 📋", "success"); closeShareModal(); }).catch(() => toast("Erro", "error")); }
$("themeToggleBtn")?.addEventListener("click", toggleTheme);
$("shareBtn")?.addEventListener("click", openShareModal);
$("shareModalCloseBtn")?.addEventListener("click", closeShareModal);
$("copyShareBtn")?.addEventListener("click", copyShareLink);
$("shareModalOverlay")?.addEventListener("click", e => { if (e.target === $("shareModalOverlay")) closeShareModal(); });

initTypeButtons();
initLocationCheckboxes();
initTheme();
loadEvents();
</script>
</body>
</html>
