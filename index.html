<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Time</title>

<style>
:root {
  --bg: #0b0b10;
  --card: #1b1b2a;
  --purple: #7b2cff;
  --text: #fff;
  --muted: #aaa;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ==================== VISÃO DESKTOP (PADRÃO) ==================== */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  height: 100vh;
  gap: 1px;
  background: var(--card);
}

.main {
  display: flex;
  flex-direction: column;
  padding: 20px;
  background: var(--bg);
  overflow-y: auto;
}

/* Header com controles */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 0 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.header-controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.calendar-header button {
  background: var(--card);
  border: none;
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}

.calendar-header button:hover {
  background: var(--purple);
  transform: scale(1.05);
}

/* Alternador de visão */
.view-toggle {
  display: flex;
  gap: 5px;
  background: var(--card);
  border-radius: 10px;
  padding: 4px;
}

.view-btn {
  padding: 6px 14px;
  font-size: 14px;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
}

.view-btn.active {
  background: var(--purple);
  color: white;
}

.view-btn:hover:not(.active) {
  background: rgba(123, 44, 255, 0.3);
  color: var(--text);
}

.month-title {
  font-size: 24px;
  font-weight: bold;
  color: var(--purple);
}

/* Dias da semana */
.weekdays {
  display: grid;
  gap: 8px;
  margin-bottom: 10px;
  padding: 0 10px;
}

.weekdays.month-view {
  grid-template-columns: repeat(7, 1fr);
}

.weekdays.week-view {
  grid-template-columns: repeat(7, 1fr);
}

.weekday {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  color: var(--purple);
  background: var(--card);
  border-radius: 8px;
}

/* Grid do calendário */
.grid {
  display: grid;
  gap: 8px;
  padding: 0 10px;
}

.grid.month-view {
  grid-template-columns: repeat(7, 1fr);
}

.grid.week-view {
  grid-template-columns: repeat(7, 1fr);
}

.cell {
  background: var(--card);
  min-height: 100px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.cell.week-view {
  min-height: 120px;
}

.cell:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(123, 44, 255, 0.2);
}

.cell.other-month {
  opacity: 0.4;
}

.today {
  border: 2px solid var(--purple);
  background: rgba(123, 44, 255, 0.1);
}

.day-number {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
  color: var(--muted);
}

.today .day-number {
  color: var(--purple);
}

.events-container {
  max-height: 70px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cell.week-view .events-container {
  max-height: 85px;
}

.event {
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.2s;
}

.event:hover {
  filter: brightness(1.1);
  transform: scale(1.02);
}

.panel {
  background: #12121a;
  padding: 20px;
  overflow-y: auto;
  border-left: 1px solid var(--card);
}

.panel h3 {
  margin-top: 0;
  color: var(--purple);
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 16px;
}

.item {
  display: flex;
  gap: 12px;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
  transition: all 0.2s;
  cursor: pointer;
}

.item:hover {
  transform: translateX(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.dateBox {
  min-width: 50px;
  height: 50px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 20px;
  color: #fff;
}

/* 🔥 AJUSTE DE FONTE (AQUI ESTÁ A MUDANÇA) */
.item strong {
  font-size: 12px;
}

.item small {
  font-size: 10px;
}

/* Botão flutuante + */
.floating-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--purple);
  color: white;
  border: none;
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(123, 44, 255, 0.4);
  transition: all 0.2s;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.floating-btn:hover {
  transform: scale(1.1);
  background: #8b3cff;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.box {
  background: var(--card);
  padding: 24px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
}

@media (max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }
  
  .weekdays, .grid, .calendar-header {
    display: none;
  }
}
</style>
</head>

<body>

</body>
</html>
