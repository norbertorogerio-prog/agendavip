<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:       #8b5cf6;
  --primary-dark:  #7c3aed;
  --primary-light: #a78bfa;
  --primary-glow:  rgba(139,92,246,0.35);
  --primary-soft:  rgba(139,92,246,0.12);
  
  --reuniao:       #3b82f6;
  --reuniao-soft:  rgba(59,130,246,0.12);
  --evento:        #10b981;
  --evento-soft:   rgba(16,185,129,0.12);
  --chg:           #f43f5e;
  --chg-soft:      rgba(244,63,94,0.12);
  --outro:         #f59e0b;
  --outro-soft:    rgba(245,158,11,0.12);
  
  --bg:            #0a0a0f;
  --surface:       #16161f;
  --surface2:      #1e1e2a;
  --border:        rgba(255,255,255,0.08);
  
  --text:          #f0f0ff;
  --text2:         #a0a0c0;
  --text3:         #6a6a8a;
  
  --radius-sm:     8px;
  --radius:        12px;
  --radius-lg:     16px;
  --radius-full:   9999px;
  
  --shadow:        0 4px 20px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0a0a0f, #12121a);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

body.light-mode {
  background: linear-gradient(135deg, #f8fafc, #f1f5f9);
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: rgba(0,0,0,0.08);
  --text: #0f172a;
  --text2: #334155;
  --text3: #64748b;
}

/* HEADER MINIMAL */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: rgba(22,22,31,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.logo-text {
  font-size: 14px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-center {
  display: flex;
  gap: 8px;
  align-items: center;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
}

.month-title {
  font-size: 14px;
  font-weight: 600;
  min-width: 140px;
  text-align: center;
}

.month-title span {
  color: var(--primary-light);
}

.btn-today {
  background: var(--primary-soft);
  border: 1px solid var(--primary);
  color: var(--primary-light);
  padding: 5px 12px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
}

.header-right {
  display: flex;
  gap: 8px;
}

.action-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
}

.add-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  color: white;
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
}

/* LAYOUT PRINCIPAL - CALENDÁRIO PEQUENO + COMPROMISSOS EM DESTAQUE */
.main-container {
  margin-top: 56px;
  display: flex;
  height: calc(100vh - 56px);
  padding: 16px 20px;
  gap: 20px;
}

/* CALENDÁRIO COMPACTO - PEQUENO E SEM IMPORTÂNCIA */
.calendar-compact {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  backdrop-filter: blur(4px);
}

.calendar-compact .weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  margin-bottom: 8px;
}

.calendar-compact .weekday {
  font-size: 9px;
  font-weight: 600;
  color: var(--text3);
  padding: 4px 0;
}

.calendar-compact .days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.calendar-compact .day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  color: var(--text2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  background: var(--surface2);
  transition: all 0.2s;
}

.calendar-compact .day:hover {
  background: var(--primary-soft);
  color: var(--primary-light);
}

.calendar-compact .day.other-month {
  opacity: 0.3;
}

.calendar-compact .day.today {
  background: var(--primary);
  color: white;
  font-weight: 700;
}

.calendar-compact .day.has-event {
  position: relative;
}

.calendar-compact .day.has-event::after {
  content: '';
  position: absolute;
  bottom: 2px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--primary-light);
}

/* ÁREA DE COMPROMISSOS - FOCO PRINCIPAL */
.compromissos-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(4px);
}

.compromissos-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.compromissos-header h2 {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.compromissos-count {
  background: var(--primary-soft);
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-light);
}

/* LISTA DE COMPROMISSOS - GRID RESPONSIVO */
.compromissos-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  align-content: start;
}

.compromisso-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}

.compromisso-card:hover {
  transform: translateY(-2px);
  border-color: var(--primary);
  box-shadow: var(--shadow);
}

/* Badges */
.badge-now, .badge-reminder {
  position: absolute;
  top: -8px;
  right: 12px;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  color: white;
}

.badge-now {
  background: linear-gradient(135deg, #10b981, #059669);
}

.badge-reminder {
  background: linear-gradient(135deg, #f97316, #ef4444);
}

.card-date {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.card-day {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary-light);
}

.card-month {
  font-size: 12px;
  color: var(--text3);
  text-transform: uppercase;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.3;
}

.card-time {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.tag {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
}

.tag-location {
  background: var(--primary-soft);
  color: var(--primary-light);
}

.card-obs {
  font-size: 11px;
  color: var(--text2);
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  line-height: 1.4;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px;
  color: var(--text3);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 16px 20px 0;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  cursor: pointer;
}
.modal-body { padding: 16px 20px 20px; }

.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.type-btn .t-icon { font-size: 14px; }
.type-btn.active[data-type="reuniao"] { background: var(--reuniao-soft); border-color: var(--reuniao); color: var(--reuniao); }
.type-btn.active[data-type="evento"] { background: var(--evento-soft); border-color: var(--evento); color: var(--evento); }
.type-btn.active[data-type="chg"] { background: var(--chg-soft); border-color: var(--chg); color: var(--chg); }
.type-btn.active[data-type="outro"] { background: var(--outro-soft); border-color: var(--outro); color: var(--outro); }

.locations-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.location-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.location-checkbox.selected { border-color: var(--primary); background: var(--primary-soft); }
.location-checkbox input { width: 14px; height: 14px; cursor: pointer; }
.location-checkbox label { flex: 1; cursor: pointer; font-size: 11px; }

.field { margin-bottom: 12px; }
.field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.duration-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 12px;
}
.modal-actions { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
.btn-save {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-del, .btn-cancel {
  flex: 1;
  padding: 8px;
  border-radius: var(--radius-sm);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.btn-del { background: var(--chg-soft); border: 1px solid var(--chg); color: var(--chg); }
.btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }

.toast-stack {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}
.toast-item {
  padding: 8px 14px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 11px;
  margin-top: 6px;
  animation: fadeIn 0.3s;
}
.toast-success { background: var(--evento); }
.toast-error { background: var(--chg); }
.toast-info { background: var(--primary); }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--surface2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(100%); }
  to { opacity: 1; transform: translateX(0); }
}

.fab-mobile {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  font-size: 26px;
  border: none;
  cursor: pointer;
  z-index: 200;
  align-items: center;
  justify-content: center;
}

@media (max-width: 768px) {
  .main-container {
    flex-direction: column;
    padding: 12px;
    gap: 12px;
  }
  .calendar-compact {
    width: 100%;
    order: 1;
  }
  .compromissos-area {
    order: 2;
  }
  .compromissos-list {
    grid-template-columns: 1fr;
  }
  .header .action-btn span:not(.icon) { display: none; }
  .fab-mobile { display: flex; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<header class="header">
  <div class="header-left">
    <div class="logo">✨</div>
    <div class="logo-text">Agenda Workplace</div>
  </div>
  <div class="header-center">
    <button class="nav-btn" id="prevBtn">◀</button>
    <div class="month-title"><span id="monthName">-</span> <span id="yearNum"></span></div>
    <button class="nav-btn" id="nextBtn">▶</button>
    <button class="btn-today" id="todayBtn">Hoje</button>
  </div>
  <div class="header-right">
    <button class="action-btn" id="themeToggleBtn">🌓</button>
    <button class="action-btn" id="shareBtn">🔗</button>
    <button class="add-btn" id="addBtn">➕ Novo</button>
  </div>
</header>

<div class="main-container">
  <!-- CALENDÁRIO COMPACTO - PEQUENO, SEM IMPORTÂNCIA -->
  <div class="calendar-compact">
    <div class="weekdays" id="compactWeekdays"></div>
    <div class="days-grid" id="compactDaysGrid"></div>
  </div>

  <!-- ÁREA DE COMPROMISSOS - FOCO PRINCIPAL -->
  <div class="compromissos-area">
    <div class="compromissos-header">
      <h2>📌 Compromissos</h2>
      <div class="compromissos-count" id="totalCount">0</div>
    </div>
    <div class="compromissos-list" id="eventsList"></div>
  </div>
</div>

<button class="fab-mobile" id="fabMobileBtn">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header"><div class="modal-title" id="modalTitle">Novo Compromisso</div><button class="modal-close" id="modalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">📌 Tipo</label>
        <div class="type-grid" id="typeGrid">
          <button class="type-btn" data-type="reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg"><span class="t-icon">⚙️</span>CHG</button>
          <button class="type-btn" data-type="outro"><span class="t-icon">📌</span>Outros</button>

      <div class="field"><div class="time-row"><div><label style="font-size:10px">Hora</label><input type="time" id="timeInput" class="field-input"></div><div><label style="font-size:10px">Duração</label><select id="durationInput" class="duration-select"><option>Dia inteiro</option><option>30 min</option><option>1 hora</option><option>2 horas</option><option>3 horas</option><option>4 horas</option><option>5 horas</option><option>6 horas</option><option>8 horas</option></select></div></div></div>
      <div class="field"><label class="field-label">📍 Locais</label><div class="locations-grid" id="locationsGrid"><div class="location-checkbox" data-location="workvivo"><input type="checkbox" id="loc_workvivo" value="Workvivo"><label for="loc_workvivo">💻 Workvivo</label></div><div class="location-checkbox" data-location="teams"><input type="checkbox" id="loc_teams" value="Microsoft Teams"><label for="loc_teams">🎥 Teams</label></div><div class="location-checkbox" data-location="auditorio_berrini"><input type="checkbox" id="loc_berrini" value="Auditório Berrini"><label for="loc_berrini">🏢 Auditório Berrini</label></div><div class="location-checkbox" data-location="auditorio_chucri"><input type="checkbox" id="loc_chucri" value="Auditório Chucri"><label for="loc_chucri">🏛️ Auditório Chucri</label></div></div></div>
      <div class="field"><label class="field-label">📝 Observações</label><textarea id="obsInput" class="field-input" rows="2" placeholder="Detalhes importantes..."></textarea></div>
      <div class="modal-actions"><button class="btn-save" id="saveBtn">💾 Salvar</button><div class="btn-row"><button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button><button class="btn-cancel" id="cancelBtn">Fechar</button></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shareModalOverlay">
  <div class="modal-box share-modal">
    <div class="modal-header"><div class="modal-title">🔗 Compartilhar</div><button class="modal-close" id="shareModalCloseBtn">✕</button></div>
    <div class="modal-body">
      <div class="share-url" id="shareUrlDisplay">Carregando...</div>
      <button class="copy-btn" id="copyShareBtn">📋 Copiar Link</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>

let reminderCheckInterval = null;

const $ = id => document.getElementById(id);
function toLocalStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function occursOn(ev, dateStr) { return dateStr >= ev.start && dateStr <= (ev.end || ev.start); }

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  $("toastStack").appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
    startReminderCheck();
  } catch { toast("Erro ao carregar", "error"); }
  finally { $("loadingOverlay")?.classList.add("hidden"); }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { 
        method: "PATCH", headers, 
        body: JSON.stringify({
          title: ev.title, tipo: ev.tipo, start: ev.start, end: ev.end,
          time: ev.time, duration: ev.duration, obs: ev.obs, locations: ev.locations || null
        })
      });
    } else {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, { method: "POST", headers, body: JSON.stringify(ev) });
    }
    if (!r.ok) throw new Error();
    toast(editId ? "Atualizado!" : "Criado!", "success");
    await loadEvents();
    closeModal();
  } catch { toast("Erro ao salvar", "error"); }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Excluir?")) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    toast("Removido", "info");
    await loadEvents();
    closeModal();
  } catch { toast("Erro", "error"); }
}

function isWithin15Minutes(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return false;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diffMinutes = (evTime - now) / (1000 * 60);
  return diffMinutes > 0 && diffMinutes <= 15;
}

function startReminderCheck() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(() => {
    const eventsToRemind = allEvents.filter(ev => isWithin15Minutes(ev));
    eventsToRemind.forEach(ev => {
      if (!ev._reminded) {
        ev._reminded = true;
        toast(`🔔 Em até 15min: ${ev.title}`, "info");
        setTimeout(() => { ev._reminded = false; }, 60000);
      }
    });
    renderList();
  }, 30000);
}

function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diff = Math.abs(now - evTime);
  return diff < 30 * 60 * 1000;
}

function renderCompactCalendar() {
  const weekdaysContainer = $("#compactWeekdays");
  const daysContainer = $("#compactDaysGrid");
  if (!weekdaysContainer || !daysContainer) return;
  
  const year = currentDate.getFullYear(), month = currentDate.getMonth(), today = toLocalStr(new Date());
  $("monthName").textContent = MONTH_NAMES[month];
  $("yearNum").textContent = year;
  
  weekdaysContainer.innerHTML = WEEK_DAYS.map(d => `<div class="weekday">${d}</div>`).join("");
  
  const firstDay = new Date(year, month, 1);
  const startDate = new Date(year, month, 1 - firstDay.getDay());
  daysContainer.innerHTML = "";
  
  for (let i = 0; i < 42; i++) {
    const date = new Date(startDate);
    date.setDate(startDate.getDate() + i);
    const dateStr = toLocalStr(date);
    const isCur = date.getMonth() === month;
    const isToday = dateStr === today;
    const hasEvent = allEvents.some(ev => occursOn(ev, dateStr));
    
    const dayDiv = document.createElement("div");
    dayDiv.className = `day ${!isCur ? "other-month" : ""} ${isToday ? "today" : ""} ${hasEvent ? "has-event" : ""}`;
    dayDiv.textContent = date.getDate();
    dayDiv.addEventListener("click", () => openModal(dateStr));
    daysContainer.appendChild(dayDiv);
  }
}

function renderList() {
  const list = $("eventsList");
  if (!list) return;
  let filtered = [...allEvents].sort((a,b) => a.start.localeCompare(b.start));
  if (!filtered.length) { 
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Nenhum compromisso agendado</div><div class="empty-text" style="font-size:11px">Clique em + para adicionar</div></div>`; 
    $("totalCount").textContent = "0"; 
    return; 
  }
  $("totalCount").textContent = filtered.length;
  list.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro;
    const day = ev.start.split("-")[2];
    const mon = MONTH_SHORT[parseInt(ev.start.split("-")[1])-1];
    const isNow = isHappeningNow(ev);
    const isReminder = isWithin15Minutes(ev);
    const dateRange = ev.start === (ev.end||ev.start) ? `${day}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]}` : `${ev.start.split("-")[2]}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]} → ${(ev.end||ev.start).split("-")[2]}/${MONTH_SHORT[parseInt((ev.end||ev.start).split("-")[1])-1]}`;
    
    let badgeHtml = '';
    if (isNow) badgeHtml = '<div class="badge-now">🔴 ACONTECENDO AGORA</div>';
    else if (isReminder) badgeHtml = '<div class="badge-reminder">⏰ EM ATÉ 15 MIN</div>';
    
    let locationsHtml = '';
    if (ev.locations) {
      const locs = ev.locations.split(',').map(l => l.trim());
      locationsHtml = `<div class="card-tags">${locs.map(loc => `<span class="tag tag-location">📍 ${loc}</span>`).join('')}</div>`;
    }
    
    const card = document.createElement("div");
    card.className = "compromisso-card";
    card.innerHTML = `${badgeHtml}
      <div class="card-date">
        <span class="card-day">${day}</span>
        <span class="card-month">${mon}</span>
      </div>
      <div class="card-title">${escapeHtml(ev.title)}</div>
      <div class="card-time">
        <span>📅 ${dateRange}</span>
        ${ev.time && ev.duration !== "Dia inteiro" ? `<span>⏰ ${ev.time}</span>` : ''}
        ${ev.duration ? `<span>⏱ ${ev.duration}</span>` : ''}
      </div>
      <div class="card-tags">
        <span class="tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
      </div>
      ${locationsHtml}
      ${ev.obs ? `<div class="card-obs">📝 ${escapeHtml(ev.obs.substring(0,120))}${ev.obs.length>120?"…":""}</div>` : ''}
    `;
    card.addEventListener("click", () => openEdit(ev.id));
    list.appendChild(card);
  });
}

function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function render() { renderCompactCalendar(); renderList(); }

let selectedType = "reuniao", selectedLocations = [];

function initTypeButtons() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $("tipoInput").value = selectedType;
    });
  });
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
}

function initLocationCheckboxes() {
  document.querySelectorAll('.location-checkbox').forEach(item => {
    const cb = item.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) { if (!selectedLocations.includes(cb.value)) selectedLocations.push(cb.value); item.classList.add('selected'); }
      else { selectedLocations = selectedLocations.filter(l => l !== cb.value); item.classList.remove('selected'); }
    });
  });
}

function resetLocations() { selectedLocations = []; document.querySelectorAll('.location-checkbox input').forEach(cb => { cb.checked = false; cb.closest('.location-checkbox').classList.remove('selected'); }); }
function setLocationsFromEvent(locations) {
  resetLocations();
  if (locations) {
    locations.split(',').map(l => l.trim()).forEach(loc => {
      const cb = document.querySelector(`.location-checkbox input[value="${loc}"]`);
      if (cb) { cb.checked = true; cb.closest('.location-checkbox').classList.add('selected'); selectedLocations.push(loc); }
    });
  }
}

function openModal(date = null) {
  editId = null; $("modalTitle").textContent = "Novo Compromisso"; $("deleteBtn").style.display = "none"; $("saveBtn").textContent = "💾 Salvar";
  $("titleInput").value = ""; $("startInput").value = date || ""; $("endInput").value = date || ""; $("timeInput").value = ""; $("durationInput").value = "30 min"; $("obsInput").value = "";
  selectedType = "reuniao";
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
  resetLocations();
  $("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const ev = allEvents.find(e => e.id === id); if (!ev) return;
  editId = id; $("modalTitle").textContent = "Editar"; $("deleteBtn").style.display = "block"; $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title; $("startInput").value = ev.start; $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || ""; $("durationInput").value = ev.duration || "30 min"; $("obsInput").value = ev.obs || "";
  const tipo = ev.tipo || "reuniao";
  selectedType = tipo;
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.type-btn[data-type="${tipo}"]`).classList.add('active');
  $("tipoInput").value = tipo;
  setLocationsFromEvent(ev.locations);
  $("modalOverlay").classList.add("open");
}
function closeModal() { $("modalOverlay").classList.remove("open"); editId = null; }

$("saveBtn")?.addEventListener("click", () => {
  const title = $("titleInput")?.value.trim(), start = $("startInput")?.value;
  if (!title || !start) { toast("Título e data obrigatórios", "error"); return; }
  saveEvent({ id: editId || Date.now(), title, tipo: $("tipoInput").value, start, end: $("endInput").value || start, time: $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value, duration: $("durationInput").value, obs: $("obsInput").value.trim(), locations: selectedLocations.length ? selectedLocations.join(", ") : null });
});
$("deleteBtn")?.addEventListener("click", deleteEvent);
$("cancelBtn")?.addEventListener("click", closeModal);
$("modalCloseBtn")?.addEventListener("click", closeModal);
$("modalOverlay")?.addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });
$("prevBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()-1); render(); });
$("nextBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()+1); render(); });
$("todayBtn")?.addEventListener("click", () => { currentDate = new Date(); render(); });
$("addBtn")?.addEventListener("click", () => openModal());
$("fabMobileBtn")?.addEventListener("click", () => openModal());

function initTheme() { if (localStorage.getItem('agendaTheme') === 'light') document.body.classList.add('light-mode'); }
function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('agendaTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); toast(document.body.classList.contains('light-mode') ? 'Modo claro' : 'Modo escuro', 'info'); }
function openShareModal() { $("shareUrlDisplay").textContent = window.location.href; $("shareModalOverlay").classList.add("open"); }
function closeShareModal() { $("shareModalOverlay").classList.remove("open"); }
function copyShareLink() { navigator.clipboard.writeText($("shareUrlDisplay").textContent).then(() => { toast("Link copiado! 📋", "success"); closeShareModal(); }).catch(() => toast("Erro", "error")); }
$("themeToggleBtn")?.addEventListener("click", toggleTheme);
$("shareBtn")?.addEventListener("click", openShareModal);
$("shareModalCloseBtn")?.addEventListener("click", closeShareModal);
$("copyShareBtn")?.addEventListener("click", copyShareLink);
$("shareModalOverlay")?.addEventListener("click", e => { if (e.target === $("shareModalOverlay")) closeShareModal(); });

initTypeButtons();
initLocationCheckboxes();
initTheme();
loadEvents();
</script>
</body>
</html>
