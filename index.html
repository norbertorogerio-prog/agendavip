<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace - Smart Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* =============================================
   DESIGN SYSTEM — AGENDA WORKPLACE SMART EDITION
   ============================================= */
:root {
  --bg:           #080810;
  --bg2:          #0f0f1a;
  --surface:      #14141f;
  --surface2:     #1a1a2e;
  --surface3:     #1e1e30;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(123,44,255,0.4);

  --purple:       #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow:  rgba(124,58,237,0.35);
  --purple-soft:  rgba(124,58,237,0.12);
  --gradient:     linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
  --gradient2:    linear-gradient(135deg, #1a1a2e 0%, #14141f 100%);

  --blue:         #3b82f6;
  --blue-soft:    rgba(59,130,246,0.15);
  --green:        #10b981;
  --green-soft:   rgba(16,185,129,0.15);
  --red:          #ef4444;
  --red-soft:     rgba(239,68,68,0.15);
  --amber:        #f59e0b;
  --amber-soft:   rgba(245,158,11,0.15);
  --pink:         #ec4899;
  --pink-soft:    rgba(236,72,153,0.15);

  --text:         #f0f0ff;
  --text2:        #a0a0c0;
  --text3:        #606080;

  --radius-sm:    8px;
  --radius:       12px;
  --radius-lg:    16px;
  --radius-xl:    20px;
  --radius-full:  9999px;

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.4);
  --shadow:       0 4px 20px rgba(0,0,0,0.5);
  --shadow-glow:  0 0 30px rgba(124,58,237,0.25);
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.6);

  --transition:   all 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: all 0.35s cubic-bezier(0.4,0,0.2,1);

  --sidebar-w:    380px;
  --header-h:     64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--purple); }

/* =============================================
   LAYOUT
   ============================================= */
.app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr var(--sidebar-w);
  height: 100vh;
  background: var(--bg);
}

/* =============================================
   TOP HEADER
   ============================================= */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 50;
  backdrop-filter: blur(12px);
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
  opacity: 0.6;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 16px var(--purple-glow);
  flex-shrink: 0;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 16px var(--purple-glow); }
  50% { box-shadow: 0 0 24px rgba(124,58,237,0.6); }
}

.brand-name {
  font-size: 15px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}

.brand-sub {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: -2px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.nav-btn:hover {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 12px var(--purple-glow);
}

.month-display {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  min-width: 190px;
  text-align: center;
  letter-spacing: -0.3px;
}

.month-display span {
  color: var(--purple-light);
}

.btn-today {
  background: var(--purple-soft);
  border: 1px solid var(--purple);
  color: var(--purple-light);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: var(--transition);
  font-family: inherit;
}
.btn-today:hover {
  background: var(--purple);
  color: #fff;
  box-shadow: 0 0 16px var(--purple-glow);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-stats {
  display: flex;
  gap: 8px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: var(--surface2);
}

.stat-chip .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}

.header-date {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-align: right;
}

.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  box-shadow: 0 2px 12px var(--purple-glow);
  white-space: nowrap;
}
.add-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(124,58,237,0.5);
}
.add-btn:active { transform: scale(0.97); }
.add-btn .icon { font-size: 14px; }

/* =============================================
   MAIN CALENDAR AREA
   ============================================= */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  padding: 16px 20px 12px;
  gap: 10px;
}

.weekdays-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.weekday-label {
  text-align: center;
  padding: 6px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  border-radius: var(--radius-sm);
}
.weekday-label.weekend {
  color: var(--purple-light);
  opacity: 0.7;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 4px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.day-cell:hover {
  border-color: var(--border-hover);
  background: var(--surface2);
  box-shadow: 0 0 0 1px var(--purple-soft), var(--shadow-sm);
  transform: translateY(-1px);
  z-index: 2;
}

.day-cell.other-month {
  opacity: 0.3;
  background: var(--bg2);
}

.day-cell.weekend .day-num {
  color: var(--purple-light);
  opacity: 0.8;
}

.day-cell.today {
  border-color: var(--purple);
  background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(192,38,211,0.05));
  box-shadow: 0 0 0 1px rgba(124,58,237,0.3), inset 0 0 20px rgba(124,58,237,0.05);
}

.day-cell.today .day-num {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
  font-size: 13px;
}

.day-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.today-dot {
  display: none;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 6px var(--purple);
}

.day-cell.today .today-dot { display: block; }

.cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  overflow: hidden;
}

.ev-pill {
  font-size: 9px;
  font-weight: 500;
  padding: 2px 5px;
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
  line-height: 1.3;
}

.ev-pill:hover {
  filter: brightness(1.2);
  transform: scale(1.01);
}

.ev-pill .ev-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(255,255,255,0.6);
}

.ev-more {
  font-size: 8px;
  color: var(--text3);
  font-weight: 600;
  padding: 1px 4px;
  cursor: pointer;
}
.ev-more:hover { color: var(--purple-light); }

/* =============================================
   SIDEBAR (MAIOR)
   ============================================= */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NOVIDADE 1: GRÁFICO */
.chart-container {
  padding: 16px 16px 8px;
  border-bottom: 1px solid var(--border);
}
.chart-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-wrapper {
  position: relative;
  height: 140px;
}

/* NOVIDADE 2: TIMELINE */
.timeline-container {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.timeline-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.timeline-days {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.timeline-day {
  flex: 1;
  min-width: 45px;
  text-align: center;
  padding: 8px 4px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: var(--transition);
  cursor: pointer;
}
.timeline-day:hover {
  border-color: var(--purple);
  transform: translateY(-2px);
}
.timeline-day-name {
  font-size: 9px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
}
.timeline-day-date {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
  margin: 4px 0;
}
.timeline-day-count {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: var(--radius-full);
  background: var(--purple-soft);
  color: var(--purple-light);
  display: inline-block;
}
.timeline-day.highlight {
  border-color: var(--purple);
  background: var(--purple-soft);
}
.timeline-day.today-timeline {
  border-color: var(--green);
  background: var(--green-soft);
}

/* Filter Tabs */
.filter-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 16px 0;
}

.filter-tab {
  flex: 1;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  text-align: center;
  letter-spacing: 0.3px;
}
.filter-tab:hover {
  border-color: var(--border-hover);
  color: var(--purple-light);
  background: var(--purple-soft);
}
.filter-tab.active {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 10px var(--purple-glow);
}

/* Search */
.search-wrap {
  padding: 12px 16px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 26px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 12px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px 8px 32px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--purple);
  box-shadow: 0 0 0 3px var(--purple-soft);
}
.search-input::placeholder { color: var(--text3); }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 16px 12px;
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  transition: var(--transition);
}
.stat-box:hover {
  border-color: var(--border-hover);
  background: var(--surface3);
}
.stat-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 4px;
}
.stat-value {
  font-size: 22px;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.stat-hint {
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
}

/* Divider */
.divider-label {
  padding: 4px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.divider-label span {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  white-space: nowrap;
}
.divider-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Events List */
.events-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ev-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}

.ev-card:hover {
  border-color: var(--border-hover);
  background: var(--surface3);
  transform: translateX(3px);
  box-shadow: -3px 0 16px rgba(124,58,237,0.15), var(--shadow-sm);
}

/* NOVIDADE 3: BADGE ACONTECENDO AGORA */
.ev-card.happening-now {
  border-left: 3px solid var(--green);
  animation: glowPulse 1.5s infinite;
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
}
.happening-badge {
  position: absolute;
  top: -2px;
  right: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 0 0 8px 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  animation: bounce 1s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

.ev-date-badge {
  width: 42px; height: 42px;
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 800;
  line-height: 1;
}
.ev-date-badge .day { font-size: 16px; }
.ev-date-badge .month {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  opacity: 0.75;
  margin-top: 1px;
}

.ev-info { flex: 1; min-width: 0; }

.ev-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.ev-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

.ev-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.2s;
}
.ev-tag:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

.ev-time {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
}

.ev-obs-preview {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px 20px;
  color: var(--text3);
  text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.4; animation: float 3s infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.empty-text { font-size: 12px; font-weight: 500; }
.empty-sub { font-size: 10px; opacity: 0.7; }

/* Modal (mesmo de antes) */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 92%;
  max-width: 460px;
  max-height: 92vh;
  overflow-y: auto;
  animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn {
  from { transform: translateY(30px) scale(0.95); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 24px 0;
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  cursor: pointer;
  transition: var(--transition);
}
.modal-close:hover {
  background: var(--red-soft);
  border-color: var(--red);
  color: var(--red);
}
.modal-body { padding: 20px 24px 24px; }
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 10px 4px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: var(--transition);
}
.type-btn .t-icon { font-size: 16px; }
.type-btn.active-reuniao { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
.type-btn.active-evento { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.type-btn.active-chg { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.type-btn.active-outro { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }
.field { margin-bottom: 12px; }
.field-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;

}

  border-color: var(--purple);

.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  margin-top: 20px;
  padding-top: 16px;

}
.btn-save {

  padding: 12px;

  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.5); }
.btn-row { display: flex; gap: 8px; }
.btn-del {
  flex: 1;
  padding: 10px;
  background: var(--red-soft);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm);
  color: var(--red);
  font-size: 12px;
  font-weight: 600;

}
.btn-del:hover { background: var(--red); color: #fff; }
.btn-cancel {
  flex: 1;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 12px;

}
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }

.toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;

}
.toast-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);

}
.toast-success { background: linear-gradient(135deg, #059669, #10b981); }
.toast-error { background: linear-gradient(135deg, #b91c1c, #ef4444); }

@keyframes toastIn {

}

.loading-overlay {

/* MOBILE */
@media (max-width: 768px) {

  <div class="modal-box">

    <div class="modal-body">
      <div class="field"><label class="field-label">Tipo</label>
        <div class="type-grid">
          <button class="type-btn active-reuniao" data-type="reuniao" id="tb-reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento" id="tb-evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg" id="tb-chg"><span class="t-icon">⚙️</span>CHG</button>

        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>
      <div class="field"><label class="field-label">Título *</label><input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…" autocomplete="off"></div>
      <div class="field"><label class="field-label">Período</label><div class="date-row"><div><label style="font-size:9px">Início *</label><input type="date" id="startInput" class="field-input"></div><div><label style="font-size:9px">Fim</label><input type="date" id="endInput" class="field-input"></div></div></div>
      <div class="field"><label class="field-label">Horário</label><div class="time-row"><div><label style="font-size:9px">Hora</label><input type="time" id="timeInput" class="field-input"></div><div><label style="font-size:9px">Duração</label><select id="durationInput" class="field-input"><option>Dia inteiro</option><option selected>30 min</option><option>1 hora</option><option>2 horas</option><option>3 horas</option></select></div></div></div>
      <div class="field"><label class="field-label">Observações</label><textarea id="obsInput" class="field-input" rows="3" placeholder="Detalhes adicionais…"></textarea></div>
      <div class="modal-actions"><button class="btn-save" id="saveBtn">💾 Salvar Compromisso</button><div class="btn-row"><button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button><button class="btn-cancel" id="cancelBtn">Fechar</button></div></div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.15)", icon: "🤝", label: "Reunião" },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.15)", icon: "🎯", label: "Evento" },
  chg:     { color: "#ef4444", soft: "rgba(239,68,68,0.15)", icon: "⚙️", label: "Mudança" },
  outro:   { color: "#ec4899", soft: "rgba(236,72,153,0.15)", icon: "📌", label: "Outro" }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const WEEK_DAYS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let allEvents = [], currentDate = new Date(), editId = null, activeFilter = "todos", searchTerm = "";
let chart = null;

const $ = id => document.getElementById(id);
function toLocalStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function occursOn(ev, dateStr) { return dateStr >= ev.start && dateStr <= (ev.end || ev.start); }

function toast(msg, type = "info") {
  const icons = { success:"✅", error:"❌", info:"💡" };
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<span>${icons[type]||"💡"}</span><span>${msg}</span>`;
  $("toastStack").appendChild(el);
  setTimeout(() => { el.remove(); }, 3200);
}

const headers = { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" };

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
    updateChart();
    updateTimeline();
  } catch { toast("Erro ao carregar eventos", "error"); }
  finally { $("loadingOverlay")?.classList.add("hidden"); }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"PATCH", headers, body: JSON.stringify(ev) });
    else r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, { method:"POST", headers, body: JSON.stringify(ev) });
    if (!r.ok) throw new Error();
    toast(editId ? "Atualizado! 🎉" : "Criado! 🎉", "success");
    await loadEvents();
    closeModal();
  } catch { toast("Erro ao salvar", "error"); }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Excluir?")) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    toast("Removido", "info");
    await loadEvents();
    closeModal();
  } catch { toast("Erro", "error"); }
}

// NOVIDADE 4: CHART
function updateChart() {
  const ctx = document.getElementById('activityChart')?.getContext('2d');
  if (!ctx) return;
  const counts = {
    reuniao: allEvents.filter(e => e.tipo === 'reuniao').length,
    evento: allEvents.filter(e => e.tipo === 'evento').length,
    chg: allEvents.filter(e => e.tipo === 'chg').length,
    outro: allEvents.filter(e => e.tipo === 'outro').length
  };
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Reuniões', 'Eventos', 'CHG', 'Outros'],
      datasets: [{
        data: [counts.reuniao, counts.evento, counts.chg, counts.outro],
        backgroundColor: ['#3b82f6', '#10b981', '#ef4444', '#ec4899'],
        borderRadius: 8,
        barPercentage: 0.65
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a2e', titleColor: '#fff', bodyColor: '#a0a0c0' } },
      scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#606080', stepSize: 1 } }, x: { ticks: { color: '#a0a0c0', font: { size: 9 } } } }
    }
  });
}

// NOVIDADE 2: TIMELINE
function updateTimeline() {
  const container = $("timelineDays");
  if (!container) return;
  const today = new Date();
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dateStr = toLocalStr(d);
    const eventsCount = allEvents.filter(ev => occursOn(ev, dateStr)).length;
    days.push({ date: d, dateStr, count: eventsCount, isToday: i === 0 });
  }
  container.innerHTML = days.map(day => `
    <div class="timeline-day ${day.isToday ? 'today-timeline' : ''} ${day.count > 0 ? 'highlight' : ''}" onclick="goToDate('${day.dateStr}')">
      <div class="timeline-day-name">${WEEK_DAYS[day.date.getDay()].substring(0,3)}</div>
      <div class="timeline-day-date">${day.date.getDate()}</div>
      <div class="timeline-day-count">${day.count} ${day.count === 1 ? 'ev' : 'evs'}</div>
    </div>
  `).join('');
}

function goToDate(dateStr) {
  const [y,m,d] = dateStr.split('-');
  currentDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  render();
  toast(`Navegando para ${d}/${m}`, "info");
}

// NOVIDADE 3: VERIFICAR EVENTO ACONTECENDO AGORA
function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [hour, minute] = ev.time.split(':');
  const evTime = new Date(now);
  evTime.setHours(parseInt(hour), parseInt(minute), 0);
  const diff = Math.abs(now - evTime);
  return diff < 30 * 60 * 1000;
}

function renderCalendar() {
  const grid = $("calendarGrid"), wr = $("weekdaysRow");
  if (!grid || !wr) return;
  const year = currentDate.getFullYear(), month = currentDate.getMonth(), today = toLocalStr(new Date());
  $("monthName").textContent = MONTH_NAMES[month];
  $("yearNum").textContent = year;
  wr.innerHTML = WEEK_DAYS.map((d,i) => `<div class="weekday-label${i===0||i===6?" weekend":""}">${d}</div>`).join("");
  grid.innerHTML = "";
  const firstDay = new Date(year, month, 1), startDate = new Date(year, month, 1 - firstDay.getDay());
  for (let i=0; i<42; i++) {
    const date = new Date(startDate); date.setDate(startDate.getDate() + i);
    const dateStr = toLocalStr(date), isCur = date.getMonth() === month, isToday = dateStr === today, isWeek = date.getDay() === 0 || date.getDay() === 6;
    const dayEvs = allEvents.filter(ev => occursOn(ev, dateStr));
    const cell = document.createElement("div");
    cell.className = `day-cell${!isCur ? " other-month" : ""}${isToday ? " today" : ""}${isWeek ? " weekend" : ""}`;
    cell.innerHTML = `<div class="day-num">${date.getDate()}<span class="today-dot"></span></div><div class="cell-events"></div>`;
    const evContainer = cell.querySelector(".cell-events");
    dayEvs.slice(0,3).forEach(ev => {
      const cfg = CONFIG[ev.tipo] || CONFIG.outro;
      const pill = document.createElement("div");
      pill.className = "ev-pill";
      pill.style.cssText = `background:${cfg.soft};color:${cfg.color}`;
      pill.innerHTML = `<span class="ev-dot" style="background:${cfg.color}"></span>${ev.duration==="Dia inteiro" ? ev.title : `${ev.time||"00:00"} ${ev.title}`}`;
      pill.addEventListener("click", e => { e.stopPropagation(); openEdit(ev.id); });
      evContainer.appendChild(pill);
    });
    if (dayEvs.length > 3) {
      const more = document.createElement("div");
      more.className = "ev-more";
      more.textContent = `+${dayEvs.length-3} mais`;
      more.addEventListener("click", e => { e.stopPropagation(); toast(`${dayEvs.length} eventos`, "info"); });
      evContainer.appendChild(more);
    }
    cell.addEventListener("click", () => openModal(dateStr));
    grid.appendChild(cell);
  }
}

function renderList() {
  const list = $("eventsList");
  if (!list) return;
  const today = toLocalStr(new Date()), year = currentDate.getFullYear(), month = currentDate.getMonth();
  const mStart = `${year}-${String(month+1).padStart(2,"0")}-01`, mEnd = `${year}-${String(month+1).padStart(2,"0")}-31`;
  let filtered = [...allEvents];
  if (activeFilter !== "todos") filtered = filtered.filter(ev => ev.tipo === activeFilter);
  if (searchTerm) { const s = searchTerm.toLowerCase(); filtered = filtered.filter(ev => ev.title.toLowerCase().includes(s) || (ev.obs||"").toLowerCase().includes(s)); }
  filtered.sort((a,b) => a.start.localeCompare(b.start));
  const thisMonth = allEvents.filter(ev => (ev.start >= mStart && ev.start <= mEnd) || (ev.end >= mStart && ev.end <= mEnd));
  const upcoming7 = allEvents.filter(ev => { const in7 = new Date(); in7.setDate(in7.getDate()+7); return ev.start >= today && ev.start <= toLocalStr(in7); });
  $("statMes").textContent = thisMonth.length;
  $("statSemana").textContent = upcoming7.length;
  $("chipTotalVal").textContent = allEvents.length;
  $("chipUpcomingVal").textContent = upcoming7.length;
  if (!filtered.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">Nenhum compromisso</div><div class="empty-sub">Clique em + para adicionar</div></div>`; return; }
  list.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro, day = ev.start.split("-")[2], mon = MONTH_SHORT[parseInt(ev.start.split("-")[1])-1];
    const isPast = ev.end < today, isNow = isHappeningNow(ev);
    const dateRange = ev.start === (ev.end||ev.start) ? `${day}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]}` : `${ev.start.split("-")[2]}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]} → ${(ev.end||ev.start).split("-")[2]}/${MONTH_SHORT[parseInt((ev.end||ev.start).split("-")[1])-1]}`;
    const card = document.createElement("div");
    card.className = `ev-card${isNow ? " happening-now" : ""}`;
    card.style.opacity = isPast ? "0.5" : "1";
    card.innerHTML = `${isNow ? '<div class="happening-badge">🔴 ACONTECENDO AGORA</div>' : ''}<div class="ev-date-badge" style="background:${cfg.soft};color:${cfg.color}"><div class="day">${day}</div><div class="month">${mon}</div></div><div class="ev-info"><div class="ev-title">${ev.title}</div><div class="ev-time">${dateRange} ${ev.time&&ev.duration!=="Dia inteiro"?" · "+ev.time:""}</div><div class="ev-meta"><span class="ev-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>${ev.duration ? `<span class="ev-tag" style="background:rgba(255,255,255,0.05);color:var(--text3)">⏱ ${ev.duration}</span>` : ""}${isPast ? `<span class="ev-tag" style="background:rgba(255,255,255,0.04);color:var(--text3)">✓ Concluído</span>` : ""}</div>${ev.obs ? `<div class="ev-obs-preview">📝 ${ev.obs.substring(0,55)}${ev.obs.length>55?"…":""}</div>` : ""}</div>`;
    const stripe = document.createElement("div"); stripe.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:3px;background:${cfg.color};border-radius:3px 0 0 3px`; card.style.position = "relative"; card.appendChild(stripe);
    card.addEventListener("click", () => openEdit(ev.id));
    list.appendChild(card);
  });
}

function render() { renderCalendar(); renderList(); updateHeaderDate(); }

function openModal(date = null) {
  editId = null; $("modalTitle").textContent = "Novo Compromisso"; $("deleteBtn").style.display = "none"; $("saveBtn").textContent = "💾 Salvar Compromisso";
  clearForm();
  if (date) { $("startInput").value = date; $("endInput").value = date; }
  selectType("reuniao"); $("modalOverlay").classList.add("open"); setTimeout(() => $("titleInput").focus(), 150);
}
function openEdit(id) {
  const ev = allEvents.find(e => e.id === id); if (!ev) return;
  editId = id; $("modalTitle").textContent = "Editar Compromisso"; $("deleteBtn").style.display = "block"; $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title; $("startInput").value = ev.start; $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || ""; $("durationInput").value = ev.duration || "30 min"; $("obsInput").value = ev.obs || "";
  selectType(ev.tipo || "reuniao"); $("modalOverlay").classList.add("open");
}
function closeModal() { $("modalOverlay").classList.remove("open"); editId = null; }
function clearForm() { ["titleInput","startInput","endInput","timeInput","obsInput"].forEach(id => { if($(id)) $(id).value = ""; }); if($("durationInput")) $("durationInput").value = "30 min"; }
function selectType(type) { $("tipoInput").value = type; ["reuniao","evento","chg","outro"].forEach(t => { const btn = $(`tb-${t}`); if(btn) btn.className = `type-btn${t===type?" active-"+t:""}`; }); }
$("saveBtn")?.addEventListener("click", () => { const title = $("titleInput").value.trim(), start = $("startInput").value; if (!title || !start) { toast("Título e data obrigatórios", "error"); return; } saveEvent({ id: editId || Date.now(), title, tipo: $("tipoInput").value, start, end: $("endInput").value || start, time: $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value, duration: $("durationInput").value, obs: $("obsInput").value.trim() }); });
$("deleteBtn")?.addEventListener("click", deleteEvent);
$("cancelBtn")?.addEventListener("click", closeModal);
$("modalCloseBtn")?.addEventListener("click", closeModal);
$("modalOverlay")?.addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });
$("prevBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()-1); render(); updateTimeline(); });
$("nextBtn")?.addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth()+1); render(); updateTimeline(); });
$("todayBtn")?.addEventListener("click", () => { currentDate = new Date(); render(); updateTimeline(); toast("Hoje", "info"); });
$("addBtn")?.addEventListener("click", () => openModal());
$("fabMobileBtn")?.addEventListener("click", () => openModal());
document.querySelectorAll(".filter-tab").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active")); btn.classList.add("active"); activeFilter = btn.dataset.filter; renderList(); }); });
$("searchInput")?.addEventListener("input", e => { searchTerm = e.target.value.trim(); renderList(); });
function updateHeaderDate() { const now = new Date(); if($("headerDate")) $("headerDate").textContent = now.toLocaleDateString("pt-BR", { weekday:"long", day:"numeric", month:"long" }); }
document.addEventListener("keydown", e => { if(e.key === "Escape") closeModal(); if(e.key === "n" && !$("modalOverlay")?.classList.contains("open") && e.target.tagName !== "INPUT") openModal(); });
loadEvents();
</script>
</body>
</html>
