<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agenda Workplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* =============================================
   DESIGN SYSTEM — AGENDA WORKPLACE
   ============================================= */
:root {
  --bg:           #080810;
  --bg2:          #0f0f1a;
  --surface:      #14141f;
  --surface2:     #1a1a2e;
  --surface3:     #1e1e30;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(123,44,255,0.4);

  --purple:       #7c3aed;
  --purple-light: #a78bfa;
  --purple-glow:  rgba(124,58,237,0.35);
  --purple-soft:  rgba(124,58,237,0.12);
  --gradient:     linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
  --gradient2:    linear-gradient(135deg, #1a1a2e 0%, #14141f 100%);

  --blue:         #3b82f6;
  --blue-soft:    rgba(59,130,246,0.15);
  --green:        #10b981;
  --green-soft:   rgba(16,185,129,0.15);
  --red:          #ef4444;
  --red-soft:     rgba(239,68,68,0.15);
  --amber:        #f59e0b;
  --amber-soft:   rgba(245,158,11,0.15);
  --pink:         #ec4899;
  --pink-soft:    rgba(236,72,153,0.15);

  --text:         #f0f0ff;
  --text2:        #a0a0c0;
  --text3:        #606080;

  --radius-sm:    8px;
  --radius:       12px;
  --radius-lg:    16px;
  --radius-xl:    20px;
  --radius-full:  9999px;

  --shadow-sm:    0 2px 8px rgba(0,0,0,0.4);
  --shadow:       0 4px 20px rgba(0,0,0,0.5);
  --shadow-glow:  0 0 30px rgba(124,58,237,0.25);
  --shadow-lg:    0 8px 40px rgba(0,0,0,0.6);

  --transition:   all 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: all 0.35s cubic-bezier(0.4,0,0.2,1);

  --sidebar-w:    360px;
  --header-h:     64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--purple); }

/* =============================================
   LAYOUT
   ============================================= */
.app {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  grid-template-columns: 1fr var(--sidebar-w);
  height: 100vh;
  background: var(--bg);
}

/* =============================================
   TOP HEADER
   ============================================= */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 50;
  backdrop-filter: blur(12px);
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
  opacity: 0.6;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 16px var(--purple-glow);
  flex-shrink: 0;
}

.brand-name {
  font-size: 15px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}

.brand-sub {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: -2px;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.nav-btn:hover {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 12px var(--purple-glow);
}

.month-display {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  min-width: 190px;
  text-align: center;
  letter-spacing: -0.3px;
}

.month-display span {
  color: var(--purple-light);
}

.btn-today {
  background: var(--purple-soft);
  border: 1px solid var(--purple);
  color: var(--purple-light);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: var(--transition);
  font-family: inherit;
}
.btn-today:hover {
  background: var(--purple);
  color: #fff;
  box-shadow: 0 0 16px var(--purple-glow);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-stats {
  display: flex;
  gap: 8px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: var(--surface2);
}

.stat-chip .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
}

.header-date {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  text-align: right;
}

.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  background: var(--gradient);
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  box-shadow: 0 2px 12px var(--purple-glow);
  white-space: nowrap;
}
.add-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(124,58,237,0.5);
}
.add-btn:active { transform: scale(0.97); }
.add-btn .icon { font-size: 14px; }

/* =============================================
   MAIN CALENDAR AREA
   ============================================= */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  padding: 20px 20px 12px;
  gap: 12px;
}

.weekdays-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.weekday-label {
  text-align: center;
  padding: 8px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  border-radius: var(--radius-sm);
}
.weekday-label.weekend {
  color: var(--purple-light);
  opacity: 0.7;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 5px;
  flex: 1;
  overflow: hidden;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.day-cell:hover {
  border-color: var(--border-hover);
  background: var(--surface2);
  box-shadow: 0 0 0 1px var(--purple-soft), var(--shadow-sm);
  transform: translateY(-1px);
  z-index: 2;
}

.day-cell.other-month {
  opacity: 0.3;
  background: var(--bg2);
}

.day-cell.weekend .day-num {
  color: var(--purple-light);
  opacity: 0.8;
}

.day-cell.today {
  border-color: var(--purple);
  background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(192,38,211,0.05));
  box-shadow: 0 0 0 1px rgba(124,58,237,0.3), inset 0 0 20px rgba(124,58,237,0.05);
}

.day-cell.today .day-num {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
  font-size: 14px;
}

.day-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.today-dot {
  display: none;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 6px var(--purple);
}

.day-cell.today .today-dot { display: block; }

.cell-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  overflow: hidden;
}

.ev-pill {
  font-size: 9.5px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
  line-height: 1.4;
}

.ev-pill:hover {
  filter: brightness(1.2);
  transform: scale(1.01);
}

.ev-pill .ev-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(255,255,255,0.6);
}

.ev-more {
  font-size: 9px;
  color: var(--text3);
  font-weight: 600;
  padding: 1px 5px;
  cursor: pointer;
}
.ev-more:hover { color: var(--purple-light); }

/* =============================================
   SIDEBAR
   ============================================= */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Filter Tabs */
.filter-tabs {
  display: flex;
  gap: 4px;
  padding: 16px 16px 0;
}

.filter-tab {
  flex: 1;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  text-align: center;
  letter-spacing: 0.3px;
}
.filter-tab:hover {
  border-color: var(--border-hover);
  color: var(--purple-light);
  background: var(--purple-soft);
}
.filter-tab.active {
  background: var(--purple-soft);
  border-color: var(--purple);
  color: var(--purple-light);
  box-shadow: 0 0 10px var(--purple-glow);
}

/* Search */
.search-wrap {
  padding: 12px 16px;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 26px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 12px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px 8px 32px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--purple);
  box-shadow: 0 0 0 3px var(--purple-soft);
}
.search-input::placeholder { color: var(--text3); }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 16px 12px;
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  transition: var(--transition);
}
.stat-box:hover {
  border-color: var(--border-hover);
  background: var(--surface3);
}
.stat-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 4px;
}
.stat-value {
  font-size: 22px;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.stat-hint {
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
}

/* Divider */
.divider-label {
  padding: 4px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.divider-label span {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  white-space: nowrap;
}
.divider-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Events List */
.events-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ev-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}

.ev-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.ev-card:hover {
  border-color: var(--border-hover);
  background: var(--surface3);
  transform: translateX(3px);
  box-shadow: -3px 0 16px rgba(124,58,237,0.15), var(--shadow-sm);
}

.ev-date-badge {
  width: 42px; height: 42px;
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 800;
  line-height: 1;
}
.ev-date-badge .day { font-size: 16px; }
.ev-date-badge .month {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  opacity: 0.75;
  margin-top: 1px;
}

.ev-info { flex: 1; min-width: 0; }

.ev-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.ev-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

.ev-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: var(--radius-full);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.ev-time {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
}

.ev-obs-preview {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px 20px;
  color: var(--text3);
  text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.4; }
.empty-text { font-size: 12px; font-weight: 500; }
.empty-sub { font-size: 10px; opacity: 0.7; }

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
  height: 14px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* =============================================
   MODAL
   ============================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  width: 92%;
  max-width: 460px;
  max-height: 92vh;
  overflow-y: auto;
  animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,58,237,0.2);
  position: relative;
}

@keyframes modalIn {
  from { transform: translateY(30px) scale(0.95); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 24px 0;
}

.modal-title {
  font-size: 17px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  font-family: inherit;
}
.modal-close:hover {
  background: var(--red-soft);
  border-color: var(--red);
  color: var(--red);
}

.modal-body { padding: 20px 24px 24px; }

/* Type selector */
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.type-btn {
  padding: 10px 4px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: var(--transition);
  font-family: inherit;
  letter-spacing: 0.2px;
}
.type-btn .t-icon { font-size: 16px; }
.type-btn:hover { border-color: var(--border-hover); }
.type-btn.active-reuniao  { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); }
.type-btn.active-evento   { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.type-btn.active-chg      { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.type-btn.active-outro    { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }

/* Form fields */
.field {
  margin-bottom: 12px;
}
.field-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  transition: var(--transition);
}
.field-input:focus {
  outline: none;
  border-color: var(--purple);
  box-shadow: 0 0 0 3px var(--purple-soft);
}
.field-input::placeholder { color: var(--text3); }
.field-input option { background: var(--surface2); color: var(--text); }

.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.time-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.modal-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.btn-save {
  width: 100%;
  padding: 12px;
  background: var(--gradient);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
  letter-spacing: 0.2px;
  box-shadow: 0 2px 12px var(--purple-glow);
}
.btn-save:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(124,58,237,0.5);
}

.btn-row { display: flex; gap: 8px; }

.btn-del {
  flex: 1;
  padding: 10px;
  background: var(--red-soft);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm);
  color: var(--red);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
}
.btn-del:hover { background: var(--red); color: #fff; }

.btn-cancel {
  flex: 1;
  padding: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
}
.btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }

/* =============================================
   TOAST
   ============================================= */
.toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  pointer-events: none;
}

.toast-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  pointer-events: all;
  max-width: 300px;
}

@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

@keyframes toastOut {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(120%); opacity: 0; }
}

.toast-item.toast-out { animation: toastOut 0.3s ease forwards; }

.toast-success { background: linear-gradient(135deg, #059669, #10b981); }
.toast-error   { background: linear-gradient(135deg, #b91c1c, #ef4444); }
.toast-info    { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.toast-warn    { background: linear-gradient(135deg, #d97706, #f59e0b); }

.toast-icon { font-size: 15px; flex-shrink: 0; }

/* =============================================
   LOADING OVERLAY
   ============================================= */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9000;
  transition: opacity 0.4s ease;
}

.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 3px solid var(--surface2);
  border-top-color: var(--purple);
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 13px;
  color: var(--text3);
  font-weight: 500;
}

/* =============================================
   MOBILE (≤768px)
   ============================================= */
@media (max-width: 768px) {
  body { overflow: auto; }

  .app {
    display: flex;
    flex-direction: column;
    height: auto;
    min-height: 100vh;
  }

  .header {
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-stats { display: none; }
  .header-date  { display: none; }
  .header-center { gap: 6px; }
  .month-display { font-size: 14px; min-width: 140px; }

  .brand-sub { display: none; }

  .main {
    padding: 12px;
    overflow: visible;
    order: 2;
  }

  .calendar-grid {
    grid-template-rows: none;
    height: auto;
  }

  .day-cell { min-height: 55px; }
  .ev-pill  { display: none; }
  .day-num  { font-size: 11px; font-weight: 700; justify-content: center; margin-bottom: 0; }

  .day-cell.has-events::after {
    content: '';
    display: block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--purple);
    margin: 3px auto 0;
  }

  .sidebar {
    order: 3;
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: none;
    overflow: visible;
  }

  .events-list { max-height: none; overflow: visible; }

  .toast-stack { bottom: 16px; right: 12px; left: 12px; }
  .toast-item { max-width: 100%; }

  .modal-box { width: 96%; border-radius: var(--radius-lg); }
  .type-grid { grid-template-columns: repeat(2, 1fr); }
  .date-row, .time-row { grid-template-columns: 1fr; }
}

/* =============================================
   CONTEXT MENU (click-day popover)
   ============================================= */
.day-popover {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  min-width: 180px;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}

.popover-header {
  font-size: 11px;
  font-weight: 700;
  color: var(--purple-light);
  padding: 4px 6px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

.popover-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  transition: var(--transition);
}
.popover-item:hover {
  background: var(--surface2);
  color: var(--text);
}
.popover-item .pi { font-size: 13px; }

/* gradient line decoration */
.grad-line {
  height: 2px;
  background: var(--gradient);
  border-radius: 2px;
  margin: 12px 0;
  opacity: 0.5;
}
</style>
</head>
<body>

<!-- ============ LOADING ============ -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="logo-icon" style="width:52px;height:52px;font-size:24px">📅</div>
  <div class="spinner"></div>
  <div class="loading-text">Carregando agenda…</div>
</div>

<!-- ============ APP ============ -->
<div class="app">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-brand">
      <div class="logo-icon">📅</div>
      <div>
        <div class="brand-name">Agenda Workplace</div>
        <div class="brand-sub">Team Schedule</div>
      </div>
    </div>

    <div class="header-center">
      <button class="nav-btn" id="prevBtn" title="Mês anterior">◀</button>

      </div>

        </div>
        <div class="stat-chip" id="chipUpcoming">

        </div>

      <div class="header-date" id="headerDate"></div>
      <button class="add-btn" id="addBtn">
        <span class="icon">＋</span> Novo Evento
      </button>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="weekdays-row" id="weekdaysRow"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <!-- Filters -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="todos">Todos</button>
      <button class="filter-tab" data-filter="reuniao">Reuniões</button>
      <button class="filter-tab" data-filter="chg">CHG</button>
      <button class="filter-tab" data-filter="evento">Eventos</button>
      <button class="filter-tab" data-filter="outro">Outros</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar compromissos…">
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Este mês</div>
        <div class="stat-value" id="statMes">0</div>
        <div class="stat-hint">compromissos</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Próximos 7d</div>
        <div class="stat-value" id="statSemana">0</div>
        <div class="stat-hint">agendados</div>
      </div>
    </div>

    <div class="divider-label"><span>Compromissos</span></div>

    <!-- List -->
    <div class="events-list" id="eventsList"></div>
  </aside>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Novo Compromisso</div>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <!-- Type selector -->
      <div class="field">
        <label class="field-label">Tipo</label>
        <div class="type-grid">
          <button class="type-btn active-reuniao" data-type="reuniao" id="tb-reuniao">
            <span class="t-icon">🤝</span>Reunião
          </button>
          <button class="type-btn" data-type="evento" id="tb-evento">
            <span class="t-icon">🎯</span>Evento
          </button>
          <button class="type-btn" data-type="chg" id="tb-chg">
            <span class="t-icon">⚙️</span>CHG
          </button>
          <button class="type-btn" data-type="outro" id="tb-outro">
            <span class="t-icon">📌</span>Outros
          </button>
        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>

      <!-- Title -->
      <div class="field">
        <label class="field-label" for="titleInput">Título *</label>
        <input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…" required autocomplete="off">
      </div>

      <!-- Dates -->
      <div class="field">
        <label class="field-label">Período</label>
        <div class="date-row">
          <div>
            <label class="field-label" style="margin-bottom:3px;font-size:9px">Início *</label>
            <input type="date" id="startInput" class="field-input" required>
          </div>
          <div>
            <label class="field-label" style="margin-bottom:3px;font-size:9px">Fim</label>
            <input type="date" id="endInput" class="field-input">
          </div>
        </div>

      <!-- Time & Duration -->
      <div class="field">
        <label class="field-label">Horário</label>
        <div class="time-row">
          <div>
            <label class="field-label" style="margin-bottom:3px;font-size:9px">Hora</label>
            <input type="time" id="timeInput" class="field-input">
          </div>
          <div>
            <label class="field-label" style="margin-bottom:3px;font-size:9px">Duração</label>
            <select id="durationInput" class="field-input">
              <option>Dia inteiro</option>
              <option selected>30 min</option>
              <option>1 hora</option>
              <option>2 horas</option>
              <option>3 horas</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Obs -->
      <div class="field">
        <label class="field-label" for="obsInput">Observações</label>
        <textarea id="obsInput" class="field-input" rows="3" placeholder="Detalhes adicionais…" style="resize:vertical;min-height:70px"></textarea>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-save" id="saveBtn">💾 Salvar Compromisso</button>
        <div class="btn-row">
          <button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button>
          <button class="btn-cancel" id="cancelBtn">Fechar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== TOAST STACK ===== -->
<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

// ================================================================
//  DESIGN TOKENS
// ================================================================
const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.15)",  icon: "🤝", label: "Reunião"  },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.15)",  icon: "🎯", label: "Evento"   },
  chg:     { color: "#ef4444", soft: "rgba(239,68,68,0.15)",   icon: "⚙️", label: "Mudança"  },
  outro:   { color: "#ec4899", soft: "rgba(236,72,153,0.15)",  icon: "📌", label: "Outro"    }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                     "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const WEEK_DAYS   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

// ================================================================
//  STATE
// ================================================================
let allEvents   = [];
let currentDate = new Date();
let editId      = null;
let activeFilter = "todos";
let searchTerm   = "";
let popover      = null;

// ================================================================
//  UTILS
// ================================================================
const $ = id => document.getElementById(id);

function toLocalStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function occursOn(ev, dateStr) {
  return dateStr >= ev.start && dateStr <= (ev.end || ev.start);
}

function isUpcoming(ev) {
  const today = toLocalStr(new Date());
  return ev.end >= today || ev.start >= today;
}

// ================================================================
//  TOAST
// ================================================================
function toast(msg, type = "info") {
  const icons = { success:"✅", error:"❌", info:"💡", warn:"⚠️" };
  const stack = $("toastStack");
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||"💡"}</span><span>${msg}</span>`;
  stack.appendChild(el);
  setTimeout(() => {
    el.classList.add("toast-out");
    setTimeout(() => el.remove(), 350);
  }, 3200);
}

// ================================================================
//  SUPABASE
// ================================================================
const headers = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json"
};

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error();
    allEvents = await r.json();
    render();
  } catch {
    toast("Erro ao carregar eventos", "error");
  } finally {
    const overlay = $("loadingOverlay");
    overlay.classList.add("hidden");
    setTimeout(() => overlay.remove(), 500);
  }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`,
        { method:"PATCH", headers, body: JSON.stringify(ev) });
    } else {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`,
        { method:"POST", headers, body: JSON.stringify(ev) });
    }
    if (!r.ok) throw new Error();
    toast(editId ? "Compromisso atualizado! 🎉" : "Compromisso criado! 🎉", "success");
    await loadEvents();
    closeModal();
  } catch {
    toast("Erro ao salvar compromisso", "error");
  }
}

async function deleteEvent() {
  if (!editId) return;
  if (!confirm("Deseja excluir este compromisso?")) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`,
      { method:"DELETE", headers });
    if (!r.ok) throw new Error();
    toast("Compromisso removido", "info");
    await loadEvents();
    closeModal();
  } catch {
    toast("Erro ao excluir", "error");
  }
}

// ================================================================
//  RENDER — CALENDAR
// ================================================================
function renderCalendar() {
  const grid   = $("calendarGrid");
  const wr     = $("weekdaysRow");
  const year   = currentDate.getFullYear();
  const month  = currentDate.getMonth();
  const today  = toLocalStr(new Date());

  // Header
  $("monthName").textContent = MONTH_NAMES[month];
  $("yearNum").textContent   = year;

  // Weekdays
  wr.innerHTML = WEEK_DAYS.map((d,i) =>
    `<div class="weekday-label${i===0||i===6?" weekend":""}">${d}</div>`
  ).join("");

  // Grid
  grid.innerHTML = "";
  const firstDay = new Date(year, month, 1);
  const startDate = new Date(year, month, 1 - firstDay.getDay());

  for (let i=0; i<42; i++) {
    const date    = new Date(startDate);
    date.setDate(startDate.getDate() + i);
    const dateStr = toLocalStr(date);
    const isCur   = date.getMonth() === month;
    const isToday = dateStr === today;
    const isWeek  = date.getDay() === 0 || date.getDay() === 6;
    const dayEvs  = allEvents.filter(ev => occursOn(ev, dateStr));

    const cell = document.createElement("div");
    cell.className = "day-cell" +
      (!isCur  ? " other-month" : "") +
      (isToday ? " today"       : "") +
      (isWeek  ? " weekend"     : "") +
      (dayEvs.length ? " has-events" : "");

    const numRow = document.createElement("div");
    numRow.className = "day-num";
    numRow.innerHTML = `${date.getDate()}<span class="today-dot"></span>`;
    cell.appendChild(numRow);

    const evContainer = document.createElement("div");
    evContainer.className = "cell-events";

    const SHOW = 3;
    dayEvs.slice(0, SHOW).forEach(ev => {
      const cfg = CONFIG[ev.tipo] || CONFIG.outro;
      const pill = document.createElement("div");
      pill.className = "ev-pill";
      pill.style.cssText = `background:${cfg.soft};color:${cfg.color};border:1px solid ${cfg.color}30`;
      pill.innerHTML = `<span class="ev-dot" style="background:${cfg.color}"></span>
        ${ev.duration==="Dia inteiro" ? ev.title : `${ev.time||"00:00"} ${ev.title}`}`;
      pill.addEventListener("click", e => { e.stopPropagation(); openEdit(ev.id); });
      evContainer.appendChild(pill);
    });

    if (dayEvs.length > SHOW) {
      const more = document.createElement("div");
      more.className = "ev-more";
      more.textContent = `+${dayEvs.length - SHOW} mais`;
      more.addEventListener("click", e => {
        e.stopPropagation();
        toast(`${dayEvs.length} compromissos em ${date.getDate()}/${MONTH_SHORT[month]}`, "info");
      });
      evContainer.appendChild(more);
    }

    cell.appendChild(evContainer);
    cell.addEventListener("click", () => openModal(dateStr));
    grid.appendChild(cell);
  }
}

// ================================================================
//  RENDER — SIDEBAR LIST
// ================================================================
function renderList() {
  const list = $("eventsList");
  list.innerHTML = "";

  const today = toLocalStr(new Date());
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const mStart = `${year}-${String(month+1).padStart(2,"0")}-01`;
  const mEnd   = `${year}-${String(month+1).padStart(2,"0")}-31`;

  // filter
  let filtered = [...allEvents];
  if (activeFilter !== "todos") filtered = filtered.filter(ev => ev.tipo === activeFilter);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(ev =>
      ev.title.toLowerCase().includes(s) ||
      (ev.obs||"").toLowerCase().includes(s)
    );
  }

  // Sort
  filtered.sort((a,b) => a.start.localeCompare(b.start));

  // Stats
  const thisMonth = allEvents.filter(ev =>
    (ev.start >= mStart && ev.start <= mEnd) ||
    (ev.end >= mStart && ev.end <= mEnd)
  );
  const upcoming7 = allEvents.filter(ev => {
    const in7 = new Date(); in7.setDate(in7.getDate()+7);
    return ev.start >= today && ev.start <= toLocalStr(in7);
  });

  $("statMes").textContent     = thisMonth.length;
  $("statSemana").textContent  = upcoming7.length;
  $("chipTotalVal").textContent    = allEvents.length;
  $("chipUpcomingVal").textContent = upcoming7.length;

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🗓️</div>
        <div class="empty-text">Nenhum compromisso encontrado</div>
        <div class="empty-sub">${searchTerm ? "Tente outro termo de busca" : "Clique em + para adicionar"}</div>
      </div>`;
    return;
  }

  filtered.forEach(ev => {
    const cfg  = CONFIG[ev.tipo] || CONFIG.outro;
    const day  = ev.start.split("-")[2];
    const mon  = MONTH_SHORT[parseInt(ev.start.split("-")[1])-1];
    const isPast = ev.end < today;
    const card = document.createElement("div");
    card.className = "ev-card";
    card.style.cssText = `border-left-color:${cfg.color};opacity:${isPast?0.5:1}`;
    card.style.setProperty("--ev-color", cfg.color);
    card.querySelector?.(".ev-card::before")?.style.setProperty("background", cfg.color);

    const dateRange = ev.start === (ev.end||ev.start)
      ? `${day}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]}`
      : `${ev.start.split("-")[2]}/${MONTH_SHORT[parseInt(ev.start.split("-")[1])-1]} → ${(ev.end||ev.start).split("-")[2]}/${MONTH_SHORT[parseInt((ev.end||ev.start).split("-")[1])-1]}`;

    card.innerHTML = `
      <div class="ev-date-badge" style="background:${cfg.soft};color:${cfg.color}">
        <div class="day">${day}</div>
        <div class="month">${mon}</div>
      </div>
      <div class="ev-info">
        <div class="ev-title">${ev.title}</div>
        <div class="ev-time">${dateRange} ${ev.time&&ev.duration!=="Dia inteiro"?" · "+ev.time:""}</div>
        <div class="ev-meta">
          <span class="ev-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
          ${ev.duration ? `<span class="ev-tag" style="background:rgba(255,255,255,0.05);color:var(--text3)">⏱ ${ev.duration}</span>` : ""}
          ${isPast ? `<span class="ev-tag" style="background:rgba(255,255,255,0.04);color:var(--text3)">✓ Concluído</span>` : ""}
        </div>
        ${ev.obs ? `<div class="ev-obs-preview">📝 ${ev.obs.substring(0,55)}${ev.obs.length>55?"…":""}</div>` : ""}
      </div>`;

    card.style.cssText += `; --before-bg: ${cfg.color}`;
    // simulate ::before via a pseudo element via inline element
    const stripe = document.createElement("div");
    stripe.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:3px;background:${cfg.color};border-radius:3px 0 0 3px`;
    card.style.position = "relative";
    card.appendChild(stripe);

    card.addEventListener("click", () => openEdit(ev.id));
    list.appendChild(card);
  });
}

function render() {
  renderCalendar();
  renderList();
  updateHeaderDate();
}

// ================================================================
//  MODAL
// ================================================================
function openModal(date = null) {
  editId = null;
  $("modalTitle").textContent = "Novo Compromisso";
  $("deleteBtn").style.display = "none";
  $("saveBtn").textContent = "💾 Salvar Compromisso";

  clearForm();
  if (date) {
    $("startInput").value = date;
    $("endInput").value   = date;
  }

  selectType("reuniao");
  $("modalOverlay").classList.add("open");
  setTimeout(() => $("titleInput").focus(), 150);
}

function openEdit(id) {
  const ev = allEvents.find(e => e.id === id);
  if (!ev) return;

  editId = id;
  $("modalTitle").textContent  = "Editar Compromisso";
  $("deleteBtn").style.display = "block";
  $("saveBtn").textContent     = "💾 Atualizar";

  $("titleInput").value    = ev.title;
  $("startInput").value    = ev.start;
  $("endInput").value      = ev.end || ev.start;
  $("timeInput").value     = ev.time || "";
  $("durationInput").value = ev.duration || "30 min";
  $("obsInput").value      = ev.obs || "";

  selectType(ev.tipo || "reuniao");
  $("modalOverlay").classList.add("open");
}

function closeModal() {
  $("modalOverlay").classList.remove("open");
  editId = null;
}

function clearForm() {
  ["titleInput","startInput","endInput","timeInput","obsInput"].forEach(id => {
    $(id).value = "";
  });
  $("durationInput").value = "30 min";
}

function selectType(type) {
  $("tipoInput").value = type;
  ["reuniao","evento","chg","outro"].forEach(t => {
    const btn = $(`tb-${t}`);
    btn.className = `type-btn${t===type?" active-"+t:""}`;
  });
}

// Type buttons
["reuniao","evento","chg","outro"].forEach(t => {
  $(`tb-${t}`).addEventListener("click", () => selectType(t));
});

// Save
$("saveBtn").addEventListener("click", () => {
  const title = $("titleInput").value.trim();
  const start = $("startInput").value;
  if (!title || !start) { toast("Título e data de início são obrigatórios", "error"); return; }

  const ev = {
    id:       editId || Date.now(),
    title,
    tipo:     $("tipoInput").value,
    start,
    end:      $("endInput").value || start,
    time:     $("durationInput").value === "Dia inteiro" ? "" : $("timeInput").value,
    duration: $("durationInput").value,
    obs:      $("obsInput").value.trim()
  };
  saveEvent(ev);
});

$("deleteBtn").addEventListener("click", deleteEvent);
$("cancelBtn").addEventListener("click", closeModal);
$("modalCloseBtn").addEventListener("click", closeModal);

// click outside closes
$("modalOverlay").addEventListener("click", e => {
  if (e.target === $("modalOverlay")) closeModal();
});

// ================================================================
//  NAVIGATION
// ================================================================
$("prevBtn").addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth()-1);
  render();
});
$("nextBtn").addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth()+1);
  render();
});
$("todayBtn").addEventListener("click", () => {
  currentDate = new Date();
  render();
  toast("Navegando para hoje", "info");
});

$("addBtn").addEventListener("click", () => openModal());

// ================================================================
//  FILTERS & SEARCH
// ================================================================
document.querySelectorAll(".filter-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderList();
  });
});

$("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value.trim();
  renderList();
});

// ================================================================
//  KEYBOARD
// ================================================================
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  if (e.key === "n" && !$("modalOverlay").classList.contains("open") && e.target.tagName !== "INPUT") {
    openModal();
  }
});

// ================================================================
//  HEADER DATE
// ================================================================
function updateHeaderDate() {
  const now = new Date();
  const opts = { weekday:"long", day:"numeric", month:"long" };
  $("headerDate").textContent = now.toLocaleDateString("pt-BR", opts);
}

// ================================================================
//  INIT
// ================================================================
loadEvents();
</script>
</body>
</html>
