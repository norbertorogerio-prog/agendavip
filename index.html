<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Agenda Inteligente</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#1b1b2a;
  --purple:#7b2cff;
  --text:#fff;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.layout{
  display:grid;
  grid-template-columns:1fr 420px;
  height:100vh;
}

.main{padding:10px;}

.kpis{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.kpi{
  flex:1;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(7,110px);
  gap:8px;
  justify-content:center;
}

.cell{
  background:var(--card);
  padding:6px;
  border-radius:10px;
}

.today{border:2px solid var(--purple);}

.event{
  font-size:10px;
  margin-top:3px;
  padding:3px;
  border-radius:5px;
}

/* LOAD BAR */
.load{
  height:5px;
  margin-top:5px;
  border-radius:4px;
}

/* PANEL */
.panel{
  background:#12121a;
  padding:15px;
  overflow:auto;
}

.item{
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.bar{
  height:8px;
  border-radius:4px;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="layout">

<div class="main">
<div class="kpis" id="kpis"></div>
<div id="grid" class="grid"></div>
</div>

<div class="panel">
<h3>📊 Dashboard Executivo</h3>
<div id="list"></div>
</div>

</div>

<script>
const DB="agendaWorkplace";
let events=JSON.parse(localStorage.getItem(DB)||"[]");

function todayStr(){
const d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

/* 🔥 CALCULAR CARGA */
function getLoad(){
let load={};

events.forEach(ev=>{
let d=ev.start;

while(d<=ev.end){
load[d]=(load[d]||0)+1;

let p=d.split("-");
let dt=new Date(p[0],p[1]-1,p[2]);
dt.setDate(dt.getDate()+1);

d=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}
});

return load;
}

function getColor(q){
if(q>=6) return "#ef4444";
if(q>=4) return "#f59e0b";
return "#22c55e";
}

function render(){

const load=getLoad();

const grid=document.getElementById("grid");
grid.innerHTML="";

const now=new Date();
const today=todayStr();

for(let i=1;i<=31;i++){
let d=new Date(now.getFullYear(),now.getMonth(),i);
if(d.getMonth()!=now.getMonth()) continue;

const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

const cell=document.createElement("div");
cell.className="cell";

if(ds===today) cell.classList.add("today");

cell.innerHTML=`<div>${i}</div>`;

(events||[]).forEach(ev=>{
if(ds>=ev.start && ds<=ev.end){
const el=document.createElement("div");
el.className="event";
el.style.background="#7b2cff";
el.innerText=ev.title;
cell.appendChild(el);
}
});

/* 🔥 BARRA DE CARGA */
if(load[ds]){
const bar=document.createElement("div");
bar.className="load";
bar.style.background=getColor(load[ds]);
bar.style.width=(load[ds]*15)+"px";
cell.appendChild(bar);
}

grid.appendChild(cell);
}

renderDashboard(load);
renderKPIs(load);
}

/* DASHBOARD */
function renderDashboard(load){
const list=document.getElementById("list");
list.innerHTML="";

const sorted=Object.entries(load).sort((a,b)=>b[1]-a[1]);

sorted.forEach(([day,q])=>{

const item=document.createElement("div");
item.className="item";

item.innerHTML=`
<b>${day}</b><br>
Carga: ${q} eventos
<div class="bar" style="width:${q*20}px;background:${getColor(q)}"></div>
${q>=6?"🔴 Sobrecarga crítica": q>=4?"⚠️ Atenção":""}
`;

list.appendChild(item);
});
}

/* KPI */
function renderKPIs(load){

const total=events.length;
const diasCriticos=Object.values(load).filter(v=>v>=6).length;
const diasAtencao=Object.values(load).filter(v=>v>=4 && v<6).length;

document.getElementById("kpis").innerHTML=`
<div class="kpi">${total}<br>Total Eventos</div>
<div class="kpi">${diasCriticos}<br>Críticos</div>
<div class="kpi">${diasAtencao}<br>Atenção</div>
`;
}

render();
</script>

</body>
</html>
