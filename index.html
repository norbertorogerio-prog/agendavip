<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Agenda Corporativa</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0f0f1a;color:#fff}
.layout{display:grid;grid-template-columns:250px 1fr 300px;height:100vh}

.sidebar{background:#141427;padding:15px}
.sidebar h2{font-size:16px}
.btn{display:block;margin:10px 0;padding:10px;background:#7b2cff;border:none;color:#fff;border-radius:6px;cursor:pointer}

.calendar{padding:10px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cell{background:#1b1b2a;min-height:100px;padding:5px;border-radius:6px}
.day{font-size:12px;color:#aaa}

.event{padding:4px;border-radius:5px;margin-top:4px;cursor:pointer}
.panel{background:#141427;padding:15px}

.kpi{background:#1b1b2a;padding:10px;margin-bottom:10px;border-radius:6px}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>Agenda</h2>
<button class="btn" onclick="openModal()">Novo Evento</button>
<button class="btn" onclick="exportICS()">Exportar Outlook</button>
</div>

<div class="calendar">
<div id="grid" class="grid"></div>
</div>

<div class="panel">
<h3>Painel Executivo</h3>
<div id="kpis"></div>
</div>

</div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a">
<div style="background:#111;padding:20px;margin:10% auto;width:300px">

<form onsubmit="save(event)">
<input id="title" placeholder="Reunião" required><br>

<input type="date" id="start" required><br>
<input type="date" id="end"><br>

<input type="time" id="time"><br>

<select id="duration">
<option>Dia inteiro</option>
<option>30 min</option>
<option>60 min</option>
</select>

<select id="tipo">
<option value="work">Work</option>
<option value="vip">VIP</option>
<option value="critico">Crítico</option>
</select>

<select id="repeat">
<option value="">Sem recorrência</option>
<option value="daily">Diário</option>
<option value="weekly">Semanal</option>
</select>

<button>Salvar</button>
<button type="button" onclick="closeModal()">Fechar</button>
</form>

</div>
</div>

<script>
const DB="agendaCorp";
let events=JSON.parse(localStorage.getItem(DB)||"[]");

const colors={
work:"#3b82f6",
vip:"#7b2cff",
critico:"#ef4444"
};

function saveDB(){localStorage.setItem(DB,JSON.stringify(events))}

function openModal(){modal.style.display="block"}
function closeModal(){modal.style.display="none"}

function save(e){
e.preventDefault();

const ev={
id:Date.now(),
title:title.value,
start:start.value,
end:end.value||start.value,
time:duration.value==="Dia inteiro"?"":time.value,
duration:duration.value,
tipo:tipo.value,
repeat:repeat.value
};

events.push(ev);
saveDB();
closeModal();
render();
}

function occurs(ev,day){
if(day<ev.start||day>ev.end)return false;

if(ev.repeat==="daily")return true;
if(ev.repeat==="weekly"){
return new Date(day).getDay()===new Date(ev.start).getDay();
}
return true;
}

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

const now=new Date();
for(let i=1;i<=30;i++){
const d=new Date(now.getFullYear(),now.getMonth(),i);
const ds=d.toISOString().slice(0,10);

const cell=document.createElement("div");
cell.className="cell";

cell.ondragover=e=>e.preventDefault();
cell.ondrop=e=>{
const id=e.dataTransfer.getData("id");
move(id,ds);
};

const day=document.createElement("div");
day.className="day";
day.textContent=i;
cell.appendChild(day);

events.forEach(ev=>{
if(occurs(ev,ds)){
const el=document.createElement("div");
el.className="event";
el.style.background=colors[ev.tipo];
el.draggable=true;

el.ondragstart=e=>e.dataTransfer.setData("id",ev.id);

el.innerText=ev.duration==="Dia inteiro"
?"📅 "+ev.title
:ev.time+" "+ev.title;

cell.appendChild(el);
}
});

grid.appendChild(cell);
}

renderKPIs();
}

function move(id,newDate){
events=events.map(ev=>{
if(ev.id==id){
const diff=(new Date(ev.end)-new Date(ev.start))/(86400000);
ev.start=newDate;
const d=new Date(newDate);
d.setDate(d.getDate()+diff);
ev.end=d.toISOString().slice(0,10);
}
return ev;
});
saveDB();
render();
}

function renderKPIs(){
const el=document.getElementById("kpis");
el.innerHTML="";

const total=events.length;
const vip=events.filter(e=>e.tipo==="vip").length;
const crit=events.filter(e=>e.tipo==="critico").length;

el.innerHTML=`
<div class="kpi">Total: ${total}</div>
<div class="kpi">VIP: ${vip}</div>
<div class="kpi">Críticos: ${crit}</div>
`;
}

/* EXPORT OUTLOOK (.ics) */
function exportICS(){
let ics="BEGIN:VCALENDAR\nVERSION:2.0\n";

events.forEach(ev=>{
ics+=`BEGIN:VEVENT
SUMMARY:${ev.title}
DTSTART:${ev.start.replace(/-/g,"")}T090000
DTEND:${ev.end.replace(/-/g,"")}T100000
END:VEVENT\n`;
});

ics+="END:VCALENDAR";

const blob=new Blob([ics]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="agenda.ics";
a.click();
}

render();
</script>

</body>
</html>
