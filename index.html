<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Agenda Workplace - Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:       #8b5cf6;
  --primary-dark:  #7c3aed;
  --primary-light: #a78bfa;
  --primary-soft:  rgba(139,92,246,0.12);
  
  --reuniao:       #3b82f6;
  --reuniao-soft:  rgba(59,130,246,0.1);
  --evento:        #10b981;
  --evento-soft:   rgba(16,185,129,0.1);
  --chg:           #f43f5e;
  --chg-soft:      rgba(244,63,94,0.1);
  --outro:         #f59e0b;
  --outro-soft:    rgba(245,158,11,0.1);
  
  --bg:            #0a0a0f;
  --surface:       #12121a;
  --card-bg:       #1a1a2a;
  --border:        rgba(255,255,255,0.06);
  
  --text:          #f0f0ff;
  --text2:         #a0a0c0;
  --text3:         #6a6a8a;
  
  --radius:        12px;
  --radius-sm:     8px;
  --radius-full:   9999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body.light-mode {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --card-bg: #f8f8fc;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --text2: #4a4a6a;
  --text3: #6a6a8a;
}

/* TOPO */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 56px;
  gap: 12px;
}

.top-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.title {
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.mini-calendar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card-bg);
  padding: 6px 14px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
}

.mini-calendar .month-year {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-light);
  min-width: 110px;
  text-align: center;
}

.mini-calendar .nav-mini {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  padding: 0 6px;
}

.search-bar input {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  color: var(--text);
  font-size: 13px;
  width: 240px;
  outline: none;
}

.search-bar input::placeholder { color: var(--text3); }

.add-button {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-full);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.top-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.theme-btn, .share-btn {
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 40px;
  height: 40px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
}

/* CONTEÚDO PRINCIPAL */
.compromissos-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.compromissos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.event-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: all 0.22s ease;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.event-card:hover {
  transform: translateY(-3px);
  border-color: var(--primary);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.badge-now {
  position: absolute;
  top: -12px;
  right: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-size: 11px;
  font-weight: 800;
  padding: 5px 14px;
  border-radius: 20px;
  z-index: 5;
  animation: pulse-now 1.6s infinite;
}

@keyframes pulse-now {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

.badge-reminder {
  position: absolute;
  top: -10px;
  right: 12px;
  background: linear-gradient(135deg, #f97316, #ef4444);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  z-index: 5;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.card-day {
  font-size: 22px;
  font-weight: 800;
  color: var(--primary-light);
}

.card-date-range {
  font-size: 10px;
  color: var(--text3);
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.meta-tag {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.location-tag {
  background: var(--primary-soft);
  color: var(--primary-light);
}

.card-obs {
  font-size: 10px;
  color: var(--text2);
  margin-top: 4px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}

.empty-icon {
  font-size: 56px;
  margin-bottom: 20px;
  opacity: 0.6;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(10px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 92%;
  max-width: 520px;
  max-height: 88vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px 0;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text3);
  cursor: pointer;
  font-size: 18px;
}
.modal-body { padding: 20px 24px 28px; }

.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.type-btn {
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.type-btn .t-icon { font-size: 18px; }
.type-btn:hover { background: rgba(139,92,246,0.08); }
.type-btn.active[data-type="reuniao"] { background: var(--reuniao-soft); border-color: var(--reuniao); color: var(--reuniao); }
.type-btn.active[data-type="evento"] { background: var(--evento-soft); border-color: var(--evento); color: var(--evento); }
.type-btn.active[data-type="chg"] { background: var(--chg-soft); border-color: var(--chg); color: var(--chg); }
.type-btn.active[data-type="outro"] { background: var(--outro-soft); border-color: var(--outro); color: var(--outro); }

.locations-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.location-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.location-checkbox.selected { border-color: var(--primary); background: var(--primary-soft); }
.location-checkbox input { width: 16px; height: 16px; cursor: pointer; }
.location-checkbox label { flex: 1; cursor: pointer; font-size: 12px; }

.field { margin-bottom: 16px; }
.field-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
  display: block;
}
.field-input, .duration-select {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 13px;
}
.date-row, .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.btn-save {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-row { display: flex; gap: 10px; margin-top: 12px; }
.btn-del, .btn-cancel {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-del { background: var(--chg-soft); border: 1px solid var(--chg); color: var(--chg); }
.btn-cancel { background: var(--card-bg); border: 1px solid var(--border); color: var(--text2); }

/* MODAL COMPARTILHAR */
.share-modal { max-width: 440px; }
.share-url {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: var(--radius-sm);
  font-family: monospace;
  font-size: 14px;
  word-break: break-all;
  margin-bottom: 16px;
  color: var(--text2);
}
.copy-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}

/* TOASTS */
.toast-stack {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
}
.toast-item {
  padding: 10px 16px;
  border-radius: var(--radius);
  color: #fff;
  font-size: 13px;
  margin-top: 8px;
  animation: fadeIn 0.4s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast-success { background: var(--evento); }
.toast-error   { background: var(--chg); }
.toast-info    { background: var(--primary); }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--card-bg);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(120%); }
  to   { opacity: 1; transform: translateX(0); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  body { overflow: auto; height: auto; }
  
  .top-bar {
    padding: 12px;
    height: auto;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .top-left { flex: 1; }
  .search-bar input { width: 100%; }
  .mini-calendar { order: 3; width: 100%; justify-content: center; margin: 8px 0 4px; }
  
  .compromissos-container { padding: 16px; }
  .compromissos-grid { grid-template-columns: 1fr; gap: 14px; }
  
  .type-grid { grid-template-columns: repeat(2, 1fr); }
  .locations-grid { grid-template-columns: 1fr; }
  
  .toast-stack { bottom: 16px; right: 16px; left: 16px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="top-bar">
  <div class="top-left">
    <div class="logo">✨</div>
    <div class="title">Agenda Workplace</div>
  </div>
  
  <div class="mini-calendar" id="miniCalendar">
    <button class="nav-mini" id="prevMonthMini">◀</button>
    <span class="month-year" id="miniMonthYear">Março 2026</span>
    <button class="nav-mini" id="nextMonthMini">▶</button>
  </div>
  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar por título ou observação...">
  </div>
  
  <div class="top-right">
    <button class="theme-btn" id="themeToggleBtn" aria-label="Alternar tema">🌓</button>
    <button class="share-btn" id="shareBtn" aria-label="Compartilhar agenda">🔗</button>
    <button class="add-button" id="addBtn" aria-label="Novo compromisso">+</button>
  </div>
</div>

<div class="compromissos-container">
  <div class="compromissos-grid" id="eventsGrid"></div>
</div>

<!-- MODAL NOVO/EDITAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Novo Compromisso</div>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">📌 Tipo</label>
        <div class="type-grid" id="typeGrid">
          <button class="type-btn" data-type="reuniao"><span class="t-icon">🤝</span>Reunião</button>
          <button class="type-btn" data-type="evento"><span class="t-icon">🎯</span>Evento</button>
          <button class="type-btn" data-type="chg"><span class="t-icon">⚙️</span>CHG</button>
          <button class="type-btn" data-type="outro"><span class="t-icon">📌</span>Outros</button>
        </div>
        <input type="hidden" id="tipoInput" value="reuniao">
      </div>
      <div class="field"><label class="field-label">📝 Título *</label><input type="text" id="titleInput" class="field-input" placeholder="Nome do compromisso…"></div>
      <div class="field">
        <div class="date-row">
          <div><label class="field-label">Início *</label><input type="date" id="startInput" class="field-input"></div>
          <div><label class="field-label">Fim</label><input type="date" id="endInput" class="field-input"></div>
        </div>
      </div>
      <div class="field">
        <div class="time-row">
          <div><label class="field-label">Hora</label><input type="time" id="timeInput" class="field-input"></div>
          <div><label class="field-label">Duração</label>
            <select id="durationInput" class="duration-select">
              <option>Dia inteiro</option>
              <option>30 min</option>
              <option>1 hora</option>
              <option>2 horas</option>
              <option>3 horas</option>
              <option>4 horas</option>
              <option>5 horas</option>
              <option>6 horas</option>
              <option>8 horas</option>
            </select>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="field-label">📍 Locais</label>
        <div class="locations-grid" id="locationsGrid">
          <div class="location-checkbox" data-location="workvivo"><input type="checkbox" id="loc_workvivo" value="Workvivo"><label for="loc_workvivo">💻 Workvivo</label></div>
          <div class="location-checkbox" data-location="teams"><input type="checkbox" id="loc_teams" value="Microsoft Teams"><label for="loc_teams">🎥 Teams</label></div>
          <div class="location-checkbox" data-location="auditorio_berrini"><input type="checkbox" id="loc_berrini" value="Auditório Berrini"><label for="loc_berrini">🏢 Auditório Berrini</label></div>
          <div class="location-checkbox" data-location="auditorio_chucri"><input type="checkbox" id="loc_chucri" value="Auditório Chucri"><label for="loc_chucri">🏛️ Auditório Chucri</label></div>
        </div>
      </div>
      <div class="field"><label class="field-label">📝 Observações</label><textarea id="obsInput" class="field-input" rows="3" placeholder="Detalhes importantes..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-save" id="saveBtn">💾 Salvar</button>
        <div class="btn-row">
          <button class="btn-del" id="deleteBtn" style="display:none">🗑 Excluir</button>
          <button class="btn-cancel" id="cancelBtn">Cancelar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL COMPARTILHAR -->
<div class="modal-overlay" id="shareModalOverlay">
  <div class="modal-box share-modal">
    <div class="modal-header">
      <div class="modal-title">🔗 Compartilhar Agenda</div>
      <button class="modal-close" id="shareModalCloseBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="share-url" id="shareUrlDisplay">Carregando...</div>
      <button class="copy-btn" id="copyShareBtn">📋 Copiar Link</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
// ================================================================
//  CONFIG & VARIÁVEIS GLOBAIS
// ================================================================
const SUPABASE_URL = "https://wffjntjupnsvtvqxfihw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Ma1Z2nNPHPxKtdfasln_w_ptK2--lb";

const CONFIG = {
  reuniao: { color: "#3b82f6", soft: "rgba(59,130,246,0.1)", icon: "🤝", label: "Reunião" },
  evento:  { color: "#10b981", soft: "rgba(16,185,129,0.1)", icon: "🎯", label: "Evento" },
  chg:     { color: "#f43f5e", soft: "rgba(244,63,94,0.1)", icon: "⚙️", label: "CHG" },
  outro:   { color: "#f59e0b", soft: "rgba(245,158,11,0.1)", icon: "📌", label: "Outro" }
};

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTH_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let allEvents = [];
let currentDate = new Date();
let editId = null;
let searchTerm = "";
let reminderCheckInterval = null;

const $ = id => document.getElementById(id);

function toLocalStr(d) {
  return d.toISOString().split('T')[0];
}

function occursOn(ev, dateStr) {
  return dateStr >= ev.start && dateStr <= (ev.end || ev.start);
}

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  $("toastStack").appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

const headers = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json"
};

async function loadEvents() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?select=*&order=start.asc`, { headers });
    if (!r.ok) throw new Error(r.status);
    allEvents = await r.json();
    render();
    startReminderCheck();
  } catch (err) {
    console.error(err);
    toast("Erro ao carregar compromissos", "error");
  } finally {
    $("loadingOverlay")?.classList.add("hidden");
  }
}

async function saveEvent(ev) {
  try {
    let r;
    if (editId) {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, {
        method: "PATCH",
        headers,
        body: JSON.stringify({
          title: ev.title,
          tipo: ev.tipo,
          start: ev.start,
          end: ev.end,
          time: ev.time,
          duration: ev.duration,
          obs: ev.obs,
          locations: ev.locations || null
        })
      });
    } else {
      r = await fetch(`${SUPABASE_URL}/rest/v1/eventos`, {
        method: "POST",
        headers,
        body: JSON.stringify(ev)  // sem id — Supabase gera
      });
    }
    if (!r.ok) throw new Error(await r.text());
    toast(editId ? "Compromisso atualizado!" : "Compromisso criado!", "success");
    await loadEvents();
    closeModal();
  } catch (err) {
    console.error(err);
    toast("Erro ao salvar", "error");
  }
}

async function deleteEvent() {
  if (!editId || !confirm("Deseja realmente excluir?")) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/eventos?id=eq.${editId}`, { method:"DELETE", headers });
    if (!r.ok) throw new Error();
    toast("Compromisso removido", "info");
    await loadEvents();
    closeModal();
  } catch {
    toast("Erro ao excluir", "error");
  }
}

function isWithin15Minutes(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return false;
  if (!ev.time) return false;
  const [h, m] = ev.time.split(':').map(Number);
  const evTime = new Date(now);
  evTime.setHours(h, m, 0, 0);
  const diffMin = (evTime - now) / 60000;
  return diffMin > 0 && diffMin <= 15;
}

function startReminderCheck() {
  if (reminderCheckInterval) clearInterval(reminderCheckInterval);
  reminderCheckInterval = setInterval(() => {
    allEvents.forEach(ev => {
      if (isWithin15Minutes(ev) && !ev._reminded) {
        ev._reminded = true;
        toast(`🔔 ${ev.title} começa em até 15 minutos`, "info");
        setTimeout(() => { ev._reminded = false; }, 90000);
      }
    });
    renderList(); // atualiza badges
  }, 30000);
}

function isHappeningNow(ev) {
  const now = new Date();
  const today = toLocalStr(now);
  if (!occursOn(ev, today)) return false;
  if (ev.duration === "Dia inteiro") return true;
  if (!ev.time) return false;
  const [h, m] = ev.time.split(':').map(Number);
  const evTime = new Date(now);
  evTime.setHours(h, m, 0, 0);
  return Math.abs(now - evTime) < 30 * 60 * 1000;
}

function getMonthFilter(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  return `${y}-${m}`;
}

function updateMiniCalendar() {
  const monthYear = $("miniMonthYear");
  if (monthYear) {
    monthYear.textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  }
}

function formatEventDate(ev) {
  const s = ev.start.split('-').map(Number);
  const startDate = new Date(s[0], s[1]-1, s[2]);
  const e = (ev.end || ev.start).split('-').map(Number);
  const endDate = new Date(e[0], e[1]-1, e[2]);

  const startDay = startDate.getDate();
  const startMonth = MONTH_SHORT[startDate.getMonth()];
  const endDay = endDate.getDate();
  const endMonth = MONTH_SHORT[endDate.getMonth()];

  if (startDate.toDateString() === endDate.toDateString()) {
    return { day: startDay, range: `${startDay} ${startMonth}` };
  }
  return { day: startDay, range: `${startDay}/${startMonth} → ${endDay}/${endMonth}` };
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderList() {
  const grid = $("eventsGrid");
  if (!grid) return;

  const filterMonth = getMonthFilter(currentDate);

  let filtered = allEvents.filter(ev => {
    const evMonth = ev.start.substring(0,7);
    if (evMonth !== filterMonth) return false;
    if (!searchTerm) return true;
    const term = searchTerm.toLowerCase();
    return ev.title.toLowerCase().includes(term) || (ev.obs && ev.obs.toLowerCase().includes(term));
  }).sort((a,b) => a.start.localeCompare(b.start));

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>Nenhum compromisso encontrado</div></div>`;
    return;
  }

  grid.innerHTML = "";
  filtered.forEach(ev => {
    const cfg = CONFIG[ev.tipo] || CONFIG.outro;
    const { day, range } = formatEventDate(ev);
    const isNow = isHappeningNow(ev);
    const isReminder = isWithin15Minutes(ev);

    let badge = '';
    if (isNow) badge = '<div class="badge-now">🔴 ACONTECENDO AGORA</div>';
    else if (isReminder) badge = '<div class="badge-reminder">⏰ EM ATÉ 15 MIN</div>';

    let locHtml = '';
    if (ev.locations) {
      const locs = ev.locations.split(',').map(l => l.trim());
      locHtml = `<div class="card-meta">${locs.map(l => `<span class="meta-tag location-tag">📍 ${l}</span>`).join('')}</div>`;
    }

    const card = document.createElement("div");
    card.className = "event-card";
    card.innerHTML = `
      ${badge}
      <div class="card-header">
        <span class="card-day">${day}</span>
        <span class="card-date-range">${range}</span>
      </div>
      <div class="card-title">${escapeHtml(ev.title)}</div>
      <div class="card-meta">
        <span class="meta-tag" style="background:${cfg.soft};color:${cfg.color}">${cfg.icon} ${cfg.label}</span>
        ${ev.time && ev.duration !== "Dia inteiro" ? `<span class="meta-tag">⏰ ${ev.time}</span>` : ''}
        ${ev.duration ? `<span class="meta-tag">⏱ ${ev.duration}</span>` : ''}
      </div>
      ${locHtml}
      ${ev.obs ? `<div class="card-obs">📝 ${escapeHtml(ev.obs.substring(0,90))}${ev.obs.length>90?'…':''}</div>` : ''}
    `;
    card.addEventListener("click", () => openEdit(ev.id));
    grid.appendChild(card);
  });
}

function render() {
  renderList();
  updateMiniCalendar();
}

// --------------------------------------------------
//  MODAL CONTROLS
// --------------------------------------------------
let selectedType = "reuniao";
let selectedLocations = [];

function initTypeButtons() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $("tipoInput").value = selectedType;
    });
  });
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
}

function initLocationCheckboxes() {
  document.querySelectorAll('.location-checkbox').forEach(item => {
    const cb = item.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) {
        if (!selectedLocations.includes(cb.value)) selectedLocations.push(cb.value);
        item.classList.add('selected');
      } else {
        selectedLocations = selectedLocations.filter(l => l !== cb.value);
        item.classList.remove('selected');
      }
    });
  });
}

function resetForm() {
  selectedType = "reuniao";
  selectedLocations = [];
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.type-btn[data-type="reuniao"]').classList.add('active');
  $("tipoInput").value = "reuniao";
  document.querySelectorAll('.location-checkbox input').forEach(cb => {
    cb.checked = false;
    cb.closest('.location-checkbox').classList.remove('selected');
  });
}

function openModal(preDate = null) {
  editId = null;
  $("modalTitle").textContent = "Novo Compromisso";
  $("deleteBtn").style.display = "none";
  $("saveBtn").textContent = "💾 Salvar";
  $("titleInput").value = "";
  const today = preDate || toLocalStr(new Date());
  $("startInput").value = today;
  $("endInput").value = today;
  $("timeInput").value = "";
  $("durationInput").value = "30 min";
  $("obsInput").value = "";
  resetForm();
  $("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const ev = allEvents.find(e => e.id === id);
  if (!ev) return;
  editId = id;
  $("modalTitle").textContent = "Editar Compromisso";
  $("deleteBtn").style.display = "inline-block";
  $("saveBtn").textContent = "💾 Atualizar";
  $("titleInput").value = ev.title;
  $("startInput").value = ev.start;
  $("endInput").value = ev.end || ev.start;
  $("timeInput").value = ev.time || "";
  $("durationInput").value = ev.duration || "30 min";
  $("obsInput").value = ev.obs || "";
  const tipo = ev.tipo || "reuniao";
  selectedType = tipo;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.type-btn[data-type="${tipo}"]`)?.classList.add('active');
  $("tipoInput").value = tipo;
  selectedLocations = [];
  if (ev.locations) {
    ev.locations.split(',').map(l => l.trim()).forEach(loc => {
      const cb = document.querySelector(`.location-checkbox input[value="${loc}"]`);
      if (cb) {
        cb.checked = true;
        cb.closest('.location-checkbox').classList.add('selected');
        selectedLocations.push(loc);
      }
    });
  }
  $("modalOverlay").classList.add("open");
}

function closeModal() {
  $("modalOverlay").classList.remove("open");
  editId = null;
}

// --------------------------------------------------
//  EVENT LISTENERS
// --------------------------------------------------
$("saveBtn").addEventListener("click", () => {
  const title = $("titleInput").value.trim();
  const start = $("startInput").value;
  const end   = $("endInput").value || start;

  if (!title || !start) {
    toast("Título e data de início são obrigatórios", "error");
    return;
  }

  if (new Date(end) < new Date(start)) {
    toast("A data final não pode ser anterior à inicial", "error");
    return;
  }

  const duration = $("durationInput").value;
  const time = duration === "Dia inteiro" ? "" : $("timeInput").value;

  const ev = {
    title,
    tipo: $("tipoInput").value,
    start,
    end,
    time,
    duration,
    obs: $("obsInput").value.trim(),
    locations: selectedLocations.length ? selectedLocations.join(", ") : null
  };

  saveEvent(ev);
});

$("deleteBtn").addEventListener("click", deleteEvent);
$("cancelBtn").addEventListener("click", closeModal);
$("modalCloseBtn").addEventListener("click", closeModal);
$("modalOverlay").addEventListener("click", e => { if (e.target === $("modalOverlay")) closeModal(); });

$("prevMonthMini").addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  render();
});

$("nextMonthMini").addEventListener("click", () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  render();
});

$("addBtn").addEventListener("click", () => openModal());

$("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderList();
});

function initTheme() {
  if (localStorage.getItem('agendaTheme') === 'light') document.body.classList.add('light-mode');
}

function toggleTheme() {
  document.body.classList.toggle('light-mode');
  localStorage.setItem('agendaTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
  toast(document.body.classList.contains('light-mode') ? 'Modo claro ativado' : 'Modo escuro ativado', 'info');
}

function openShareModal() {
  $("shareUrlDisplay").textContent = window.location.href;
  $("shareModalOverlay").classList.add("open");
}

function closeShareModal() {
  $("shareModalOverlay").classList.remove("open");
}

function copyShareLink() {
  navigator.clipboard.writeText($("shareUrlDisplay").textContent)
    .then(() => {
      toast("Link copiado com sucesso! 📋", "success");
      closeShareModal();
    })
    .catch(() => toast("Não foi possível copiar", "error"));
}

$("themeToggleBtn").addEventListener("click", toggleTheme);
$("shareBtn").addEventListener("click", openShareModal);
$("shareModalCloseBtn").addEventListener("click", closeShareModal);
$("copyShareBtn").addEventListener("click", copyShareLink);
$("shareModalOverlay").addEventListener("click", e => { if (e.target === $("shareModalOverlay")) closeShareModal(); });

// Inicialização
initTypeButtons();
initLocationCheckboxes();
initTheme();
loadEvents();
</script>
</body>
</html>
