<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Agenda Workplace</title>

<style>
:root{
  --bg:#0b0b10;
  --card:#1b1b2a;
  --purple:#7b2cff;
  --text:#fff;
  --muted:#aaa;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.layout{
  display:grid;
  grid-template-columns:240px 1fr 320px;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#12121a;
  padding:20px;
}
.logo{
  font-size:18px;
  font-weight:bold;
  color:var(--purple);
}
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:var(--purple);
  border:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* CALENDÁRIO */
.calendar{
  padding:15px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.cell{
  background:var(--card);
  min-height:110px;
  padding:6px;
  border-radius:10px;
}
.day{
  font-size:12px;
  color:var(--muted);
}
.event{
  font-size:11px;
  padding:4px;
  border-radius:6px;
  margin-top:4px;
  cursor:pointer;
}

/* DASHBOARD */
.panel{
  background:#12121a;
  padding:15px;
  overflow:auto;
}
.panel h3{
  margin-top:0;
}
.item{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000a;
  display:none;
  align-items:center;
  justify-content:center;
}
.box{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}
input,select{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="logo">📊 Agenda Workplace</div>
  <button class="btn" onclick="openModal()">+ Novo Evento</button>
</div>

<div class="calendar">
  <div id="grid" class="grid"></div>
</div>

<div class="panel">
  <h3>📌 Compromissos do Time</h3>
  <div id="list"></div>
</div>

</div>

<div id="modal" class="modal">
<div class="box">

<form onsubmit="save(event)">
<input id="title" placeholder="Título" required>

<select id="tipo">
<option value="reuniao">Reunião</option>
<option value="evento">Evento</option>
<option value="chg">Mudança (CHG)</option>
<option value="outro">Outros</option>
</select>

<input type="date" id="start" required>
<input type="date" id="end">

<input type="time" id="time">

<select id="duration">
<option>Dia inteiro</option>
<option selected>30 min</option>
<option>1 hora</option>
</select>

<button class="btn">Salvar</button>
<button type="button" class="btn" onclick="closeModal()">Fechar</button>
</form>

</div>
</div>

<script>
const DB="agendaWorkplace";

let events=JSON.parse(localStorage.getItem(DB)||"[]");
let editId=null;

const colors={
reuniao:"#3b82f6",
evento:"#22c55e",
chg:"#ef4444",
outro:"#a855f7"
};

function saveDB(){
  localStorage.setItem(DB,JSON.stringify(events));
}

function openModal(){
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
  editId=null;
}

function save(e){
  e.preventDefault();

  const ev={
    id: editId || Date.now(),
    title:title.value,
    tipo:tipo.value,
    start:start.value,
    end:end.value||start.value,
    time: duration.value==="Dia inteiro"?"":time.value,
    duration:duration.value
  };

  if(editId){
    events=events.map(x=>x.id===editId?ev:x);
  }else{
    events.push(ev);
  }

  saveDB();
  closeModal();
  render();
}

function occurs(ev,day){
  return day>=ev.start && day<=ev.end;
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  const now=new Date();
  const y=now.getFullYear();
  const m=now.getMonth();

  for(let i=1;i<=31;i++){
    const d=new Date(y,m,i);
    if(d.getMonth()!=m) continue;

    const ds=d.toISOString().slice(0,10);

    const cell=document.createElement("div");
    cell.className="cell";

    const day=document.createElement("div");
    day.className="day";
    day.textContent=i;

    cell.appendChild(day);

    events.forEach(ev=>{
      if(occurs(ev,ds)){
        const el=document.createElement("div");
        el.className="event";
        el.style.background=colors[ev.tipo];

        el.onclick=()=>edit(ev.id);

        el.innerText=ev.duration==="Dia inteiro"
          ? "📅 "+ev.title
          : ev.time+" "+ev.title;

        cell.appendChild(el);
      }
    });

    grid.appendChild(cell);
  }

  renderList();
}

function renderList(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const sorted=[...events].sort((a,b)=>a.start.localeCompare(b.start));

  sorted.forEach(ev=>{
    const item=document.createElement("div");
    item.className="item";
    item.style.borderLeft="5px solid "+colors[ev.tipo];

    item.innerHTML=`
      <b>${ev.title}</b><br>
      ${ev.start} ${ev.time||"Dia inteiro"}<br>
      <small>${ev.tipo}</small>
    `;

    list.appendChild(item);
  });
}

function edit(id){
  const ev=events.find(e=>e.id===id);
  editId=id;

  title.value=ev.title;
  tipo.value=ev.tipo;
  start.value=ev.start;
  end.value=ev.end;
  time.value=ev.time;
  duration.value=ev.duration;

  openModal();
}

render();
</script>

</body>
</html>
